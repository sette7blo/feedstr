<html lang="en">

  <title>Feedstr</title>
  <meta name="description" content="Multi-column Nostr feed reader." />
  <meta name="theme-color" content="#7c3cff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Feedstr" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="./manifest.webmanifest?v=feedstr-fd-logo" />
  <link rel="icon" type="image/x-icon" href="./favicon.ico?v=feedstr-fd-logo" />
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png?v=feedstr-fd-logo" />
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png?v=feedstr-fd-logo" />
  <link rel="stylesheet" href="./styles.css?v=mobile-drawer-half-1" />

<body>

<header class="mobile-topbar" aria-label="Feedstr mobile navigation">
  <button class="mobile-menu-button" id="mobile-menu-toggle" type="button" aria-label="Open menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <div class="mobile-brand">
    <img class="brand-logo" src="./icons/header-logo.png?v=feedstr-fd-logo" width="26" height="26" alt="" />
    <span class="brand-name">Feed<span class="brand-name-accent">str</span></span>
  </div>
  <span class="mobile-topbar-spacer" aria-hidden="true"></span>
</header>
<div class="mobile-menu-backdrop" id="mobile-menu-backdrop"></div>

<div class="app">
  <!-- sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img class="brand-logo" src="./icons/header-logo.png?v=feedstr-fd-logo" width="34" height="34" alt="Feedstr" />
      <span class="brand-name">Feed<span class="brand-name-accent">str</span></span>
    </div>

    <nav class="sidebar-nav">
      <div class="sidebar-section">
        <span>Columns</span>
        <button class="section-add" id="add-column-btn" type="button" title="Add column" aria-label="Add column">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div id="column-list"></div>
    </nav>

    <div class="sidebar-compose">
      <button class="btn btn-primary compose-open-btn" id="compose-open-btn" type="button" aria-label="Compose a note">
        <span class="compose-open-icon" aria-hidden="true"></span>
        <span>Compose</span>
      </button>
    </div>

    <div class="sidebar-footer">
      <button class="connection-chip" id="idenstr-settings-btn" type="button" title="Open Feedstr settings" aria-label="Open Feedstr settings">
        <span class="connection-chip-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.14.31.22.65.22 1H21a2 2 0 0 1 0 4h-1.38c0 .35-.08.69-.22 1z"/></svg></span>
        <span class="connection-chip-main">
          <span class="connection-chip-label">Settings</span>
          <span class="connection-chip-status" id="idenstr-summary">
            <span class="connection-dot"></span>
            <span class="connection-chip-text">Checking Idenstr&hellip;</span>
          </span>
        </span>
        <svg class="connection-chip-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div class="sidebar-status" id="status-bar">
        <span class="dot"></span>Connecting...
      </div>
    </div>
  </aside>

  <!-- columns -->
  <div class="columns" id="columns"></div>
</div>

<!-- floating compose button (primary on mobile) -->
<button class="compose-fab" id="compose-fab" type="button" aria-label="Compose a note">
  <span class="compose-fab-icon" aria-hidden="true"></span>
</button>

<!-- add column modal -->
<div class="modal-overlay" id="add-column-modal">
  <div class="modal" id="modal-content">
    <!-- populated by JS -->
  </div>
</div>

<div class="toast-host" id="toast-host" aria-live="polite" aria-atomic="false"></div>

<!-- compose modal -->
<div class="modal-overlay" id="compose-modal">
  <div class="modal compose-modal-card">
    <div class="compose-head">
      <span class="compose-label">Compose</span>
      <div class="compose-head-right">
        <span class="compose-at-hint" title="Type @ to mention a follow">@ to mention</span>
        <button class="compose-close-btn" id="compose-close-btn" type="button" aria-label="Close composer"></button>
      </div>
    </div>
    <div class="compose-input-wrap">
      <textarea id="compose-text" placeholder="Share an update&hellip;"></textarea>
      <div class="mention-suggest hidden" id="compose-mention-suggest" role="listbox" aria-label="Mention suggestions"></div>
    </div>
    <div class="compose-tags hidden" id="compose-tags" aria-label="Tagged people"></div>
    <div class="compose-media-status hidden" id="compose-media-status" role="status" aria-live="polite"></div>
    <div class="compose-actions">
      <input class="compose-media-input" id="compose-media-input" type="file" accept="image/*" hidden aria-hidden="true" tabindex="-1" />
      <button class="btn btn-ghost btn-sm compose-media-btn" id="compose-media-btn" type="button" title="Insert photo" aria-label="Insert photo from this device">
        <span class="compose-media-icon" aria-hidden="true"></span>
        <span class="compose-media-text">Photo</span>
      </button>
      <button class="btn btn-primary btn-sm" id="compose-send" disabled>Post</button>
    </div>
  </div>
</div>

<script>
// -- state --
const state = {
  identity: null,
  relays: { read: [], write: [] },
  following: [],
  columns: [],
  subs: new Map(),
  sockets: new Map(),
  profileSockets: new Map(),
  notes: new Map(),
  liked: new Set(),
  mutes: { entries: [] }, // Idenstr kind:10000 mute list; suppresses keywords, people, threads, and events
  likeEvents: new Map(), // noteId -> our own kind:7 reaction event id (for un-like)
  replyCounts: new Map(), // noteId -> Set of reply event ids
  reactionCounts: new Map(), // noteId -> Set of kind:7 event ids
  repostCounts: new Map(), // noteId -> Set of kind:6 event ids
  embeddedEventFetchTried: new Set(),
  profiles: new Map(),
  profileFetchTried: new Set(),
  profileFetchAttempts: new Map(),
  config: null,
  idenstrStatus: null,
  composeMentionIndex: [],
  composeMentions: [],
  zapDefaultSats: 100 // one-tap zap amount; overridden from the state store at boot
};

// Populated from /api/v1/config at boot — Feedstr's server is the single source
// of truth for the scope list, so it can't drift from a hardcoded frontend copy.
let requiredIdenstrScopes = [];
const profileDiscoveryRelays = ['wss://purplepag.es', 'wss://user.kindpag.es'];

// -- boot --
async function boot() {
  try {
    state.config = await api('/api/v1/config');
    requiredIdenstrScopes = state.config.requiredIdenstrScopes ?? requiredIdenstrScopes;
    state.idenstrStatus = await api('/api/v1/idenstr/status');
    renderIdenstrSummary();

    if (!state.config.idenstrTokenConfigured) {
      setStatus(false, 'Idenstr token missing');
      showIdenstrSettings('Feedstr needs an Idenstr-issued token before it can load feeds or publish.');
      return;
    }
    if (state.idenstrStatus.missingScopes?.length) {
      setStatus(false, 'Idenstr token missing scopes');
      showIdenstrSettings(`Token is missing: ${state.idenstrStatus.missingScopes.join(', ')}`);
      return;
    }

    const [identity, relays, directoryResponse, mutesResponse] = await Promise.all([
      api('/api/v1/idenstr/identity'),
      api('/api/v1/idenstr/relays'),
      api('/api/v1/idenstr/following/directory'),
      api('/api/v1/idenstr/mutes').catch(() => null)
    ]);
    const directory = Array.isArray(directoryResponse) ? directoryResponse : (directoryResponse.entries ?? directoryResponse.following ?? []);
    state.identity = identity;
    const privateRelayUrl = state.config.privateRelayUrl || '';
    state.relays.read = relays.read ?? [];
    state.relays.write = relays.write ?? [];
    if (privateRelayUrl) state.relays.read = [privateRelayUrl, ...state.relays.read];
    state.following = directory.map(e => ({
      pubkey: e.pubkey,
      npub: '',
      petname: e.petname ?? '',
      name: e.name ?? e.petname ?? '',
      picture: e.picture ?? ''
    }));
    refreshFollowingSet();

    // Seed profile cache from Idenstr's directory. Keep the full profile payload
    // when available so zap fields such as lud16/lud06/lightningAddress are not
    // discarded before Feedstr's own kind:0 refresh runs.
    for (const e of directory) {
      if (e.pubkey) {
        const profile = e.profile ?? {};
        state.profiles.set(e.pubkey, {
          ...profile,
          name: profile.name ?? e.name ?? '',
          display_name: profile.display_name ?? profile.displayName ?? e.name ?? '',
          picture: profile.picture ?? e.picture ?? '',
          created_at: profile.created_at ?? e.profileEvent?.created_at ?? 0
        });
      }
    }

    buildComposeMentionIndex();
    renderComposeMentionPicker();

    setStatus(true, `${state.relays.read.length} relays · ${state.following.length} follows`);

    // load saved columns from Feedstr's DB, migrating any older localStorage copy
    state.columns = await loadColumns();
    state.liked = await loadLiked();
    state.zapDefaultSats = await loadZapDefault();
    state.mutes = normalizeMutes(mutesResponse || await loadMutes());
    refreshMuteSets();
    renderColumns();
    for (const col of state.columns) hydrateColumnCache(col);
    connectRelays();
  } catch (err) {
    setStatus(false, 'Failed to connect to Idenstr');
    renderIdenstrSummary(err);
    showIdenstrSettings(err.message);
    console.error('Boot failed:', err);
  }
}

// -- api helper --
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!res.ok) {
    let detail = `${res.status} ${res.statusText}`;
    try {
      const body = await res.json();
      detail = body.detail || body.message || body.error || detail;
    } catch {}
    throw new Error(detail);
  }
  return res.json();
}

// Drives the single sidebar connection chip. The full URL/token/scope detail
// lives in the settings modal the chip opens; here we show just the state.
function renderIdenstrSummary(error = null) {
  const chip = document.getElementById('idenstr-settings-btn');
  const el = document.getElementById('idenstr-summary');
  const cfg = state.config;
  const status = state.idenstrStatus;
  let stateClass = 'warn';
  let text = 'Checking Idenstr…';
  if (error) {
    stateClass = 'error';
    text = 'Idenstr unreachable';
  } else if (!cfg) {
    stateClass = 'warn';
    text = 'Idenstr not checked';
  } else if (status?.ok) {
    stateClass = 'ok';
    text = 'Idenstr connected';
  } else {
    stateClass = 'warn';
    text = cfg.idenstrTokenConfigured ? 'Idenstr setup needed' : 'Idenstr token missing';
  }
  if (chip) chip.className = `connection-chip ${stateClass}`;
  el.innerHTML = `<span class="connection-dot"></span><span class="connection-chip-text">${esc(text)}</span>`;
}

function showIdenstrSettings(reason = '') {
  const cfg = state.config || {};
  const status = state.idenstrStatus || {};
  const required = cfg.requiredIdenstrScopes || requiredIdenstrScopes;
  const granted = status.grantedScopes || [];
  const missing = status.missingScopes || required;
  const privateRelay = cfg.privateRelayUrl || '';
  const linked = Boolean(status.ok && cfg.idenstrTokenConfigured && !missing.length);
  const tokenLabel = cfg.idenstrTokenConfigured ? 'configured' : 'missing';
  const mc = document.getElementById('modal-content');
  const relayOk = Boolean(privateRelay);
  const tokenOk = Boolean(cfg.idenstrTokenConfigured);
  const scopesOk = !missing.length;
  const apiOk = Boolean(cfg.idenstrUrl) && Boolean(status.ok);
  const flag = (ok, okText, warnText) =>
    `<span class="stack-flag ${ok ? 'ok' : 'warn'}">${ok ? okText : warnText}</span>`;
  mc.innerHTML = `
    <div class="connection-head">
      <div>
        <div class="section-label">Settings</div>
        <h2>Feedstr</h2>
        <p class="settings-copy">Feedstr keeps no nsec. It stores only Idenstr's URL, a scoped token, and the relay address you set, then asks Idenstr for signing.</p>
      </div>
      <span class="status-orb ${linked ? 'ok' : 'warn'}">${linked ? 'linked' : 'setup'}</span>
    </div>
    ${reason ? `<div class="terminal-mini ${linked ? 'ok' : 'warn'}">$ feedstr stack check\n${esc(reason)}</div>` : ''}

    <div class="connection-section">
      <div class="subsection-head">
        <span>Stack connection</span>
        <button class="btn btn-ghost btn-mini" type="button" id="settings-recheck">Recheck</button>
      </div>
      <div class="stack-summary">
        <div class="stack-row">
          <span class="stack-row-label">Idenstr</span>
          <span class="stack-row-value"><strong>${esc(cfg.idenstrUrl || 'not configured')}</strong>${flag(apiOk, 'reachable', cfg.idenstrUrl ? 'no response' : 'not set')}</span>
        </div>
        <div class="stack-row">
          <span class="stack-row-label">Private relay</span>
          <span class="stack-row-value"><strong>${esc(privateRelay || 'not set')}</strong>${flag(relayOk, 'set', 'not set')}</span>
        </div>
        <div class="stack-row">
          <span class="stack-row-label">Scoped token</span>
          <span class="stack-row-value"><strong>${esc(tokenLabel)}</strong>${flag(tokenOk, 'present', 'missing')}</span>
        </div>
        <div class="stack-row">
          <span class="stack-row-label">Token scopes</span>
          <span class="stack-row-value"><strong>${scopesOk ? 'all granted' : `${missing.length} missing`}</strong>${flag(scopesOk, 'ok', 'incomplete')}</span>
        </div>
      </div>

      <details class="setup-details" id="edit-connection"${linked ? '' : ' open'}>
        <summary>Edit connection</summary>
        <form id="idenstr-config-form" class="settings-form">
          <div class="form-grid settings-form-grid">
            <label>
              Idenstr URL
              <input name="idenstrUrl" type="url" placeholder="http://100.x.y.z:3000" value="${esc(cfg.idenstrUrl || '')}" required />
            </label>
            <label>
              Idenstr token
              <input name="idenstrToken" type="password" autocomplete="off" placeholder="Paste new idstr_ token, or leave blank" />
              <small>Current token: ${cfg.idenstrTokenConfigured ? 'configured' : 'missing'}.</small>
            </label>
          </div>
          <label class="relay-field">
            Private relay
            <div class="relay-input-row">
              <input name="privateRelayUrl" type="text" inputmode="url" autocapitalize="off" autocomplete="off" spellcheck="false" placeholder="ws://192.168.x.x:7777" value="${esc(cfg.privateRelayUrl || '')}" />
              <button class="btn btn-ghost relay-test-btn" type="button" id="relay-test-btn">Test</button>
            </div>
            <small>Idenstr's private relay (LAN or Tailscale address). Saved to <code>FEEDSTR_PRIVATE_RELAY_URL</code>. Test checks it from this browser, exactly how the feed reads it.</small>
          </label>
          <div id="relay-test-status" class="terminal-mini hidden"></div>

          <div class="scope-detail">
            <div class="subsection-head"><span>Required token scopes</span><small>${missing.length ? `${missing.length} missing` : 'all granted'}</small></div>
            <div class="scope-list">
              ${required.map(scope => `<span class="scope ${missing.includes(scope) ? 'missing' : 'ok'}">${esc(scope)}</span>`).join('')}
            </div>
            ${granted.length ? `<div class="terminal-mini ok">$ idenstr token scopes\n${esc(granted.join('\n'))}</div>` : ''}
          </div>

          <details class="setup-details setup-steps-details">
            <summary>How to create the token</summary>
            <ol class="setup-steps">
              <li>Open Idenstr and go to the API tokens section.</li>
              <li>Create a token named <code>feedstr</code>.</li>
              <li>Select: <code>${esc(required.join(', '))}</code>.</li>
              <li>Paste the token above and save; Idenstr only shows it once.</li>
            </ol>
          </details>

          <div class="modal-actions">
            <button class="btn btn-primary" type="submit" id="settings-save">Save link</button>
          </div>
          <div id="settings-save-status" class="terminal-mini hidden"></div>
        </form>
      </details>
    </div>

    <div class="connection-section">
      <div class="subsection-head"><span>Zaps</span><small>one-tap default</small></div>
      <p class="settings-copy">Tapping the lightning bolt on a note instantly zaps this amount through Idenstr's wallet. Hold the bolt (or right-click) to choose a custom amount and add a comment.</p>
      <form id="zap-default-form" class="relay-input-row">
        <input id="zap-default-input" type="text" inputmode="numeric" pattern="[0-9]*" autocomplete="off" value="${esc(String(state.zapDefaultSats ?? 100))}" aria-label="Default zap amount in sats" />
        <button class="btn btn-ghost" type="submit">Save</button>
      </form>
      <div id="zap-default-status" class="terminal-mini hidden"></div>
    </div>

    <div class="connection-section">
      <div class="subsection-head"><span>Muted keywords</span><small>${muteEntriesByType('keyword').length} active</small></div>
      <p class="settings-copy">Notes containing any of these words are hidden from every feed.</p>
      <form id="mute-add-form" class="relay-input-row">
        <input id="mute-input" type="text" placeholder="word or phrase" autocomplete="off" autocapitalize="off" spellcheck="false" />
        <button class="btn btn-ghost" type="submit">Mute</button>
      </form>
      <div class="mute-list" id="mute-list"></div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" type="button" id="settings-close">Close</button>
    </div>
  `;
  document.getElementById('settings-close').onclick = closeModal;
  document.getElementById('settings-recheck').onclick = recheckIdenstrSettings;
  document.getElementById('relay-test-btn').onclick = testRelayConnection;
  document.getElementById('idenstr-config-form').addEventListener('submit', saveIdenstrSettings);

  document.getElementById('zap-default-form')?.addEventListener('submit', (e) => {
    e.preventDefault();
    const input = document.getElementById('zap-default-input');
    const status = document.getElementById('zap-default-status');
    const amount = Math.round(Number(input.value.trim()));
    status.classList.remove('hidden');
    if (!Number.isFinite(amount) || amount < 1 || amount > 100000) {
      status.className = 'terminal-mini error';
      status.textContent = '$ feedstr zap\nerror: enter a whole number of sats between 1 and 100000';
      return;
    }
    state.zapDefaultSats = amount;
    input.value = String(amount);
    persistZapDefault();
    status.className = 'terminal-mini ok';
    status.textContent = `$ feedstr zap\nsaved: one tap now sends ${amount} sats`;
  });

  renderMuteList();
  document.getElementById('mute-add-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const input = document.getElementById('mute-input');
    const term = input.value.trim().toLowerCase();
    input.value = '';
    if (!term || muteEntriesByType('keyword').some(entry => entry.value === term)) return;
    muteKeyword(term);
  });
  document.getElementById('mute-list').addEventListener('click', (e) => {
    const btn = e.target.closest('.mute-remove');
    if (!btn) return;
    unmuteKeyword(btn.dataset.mute);
  });

  modal.classList.add('open');
}

function renderMuteList() {
  const list = document.getElementById('mute-list');
  if (!list) return;
  const keywords = muteEntriesByType('keyword');
  list.innerHTML = keywords.length
    ? keywords.map(m => `<span class="mute-chip">${esc(m.value)}<button type="button" class="mute-remove" data-mute="${esc(m.value)}" aria-label="Unmute ${esc(m.value)}">&times;</button></span>`).join('')
    : '<span class="settings-copy">No muted keywords.</span>';
  const count = list.closest('.connection-section')?.querySelector('.subsection-head small');
  if (count) count.textContent = `${keywords.length} active`;
}

async function recheckIdenstrSettings() {
  const button = document.getElementById('settings-recheck');
  setButtonState(button, 'busy', 'Checking...');
  try {
    state.config = await api('/api/v1/config');
    state.idenstrStatus = await api('/api/v1/idenstr/status');
    renderIdenstrSummary();
    showIdenstrSettings(state.idenstrStatus.ok ? 'Connection is healthy.' : 'Connection still needs attention.');
  } finally {
    setButtonState(button, 'idle');
  }
}

async function saveIdenstrSettings(event) {
  event.preventDefault();
  const form = event.currentTarget;
  const button = document.getElementById('settings-save');
  const status = document.getElementById('settings-save-status');
  const payload = {
    idenstrUrl: form.elements.idenstrUrl.value.trim(),
    privateRelayUrl: form.elements.privateRelayUrl.value.trim()
  };
  const token = form.elements.idenstrToken.value.trim();
  if (token) payload.idenstrToken = token;
  status.className = 'terminal-mini running';
  status.textContent = '$ feedstr save-link\nwriting .env...';
  setButtonState(button, 'busy', 'Saving...');
  try {
    await api('/api/v1/config', { method: 'PUT', body: payload });
    state.config = await api('/api/v1/config');
    state.idenstrStatus = await api('/api/v1/idenstr/status');
    renderIdenstrSummary();
    status.className = 'terminal-mini ok';
    status.textContent = '$ feedstr save-link\nok: saved link + private relay';
    setButtonState(button, 'done', 'Saved');
    setTimeout(() => setButtonState(button, 'idle'), 1200);
  } catch (err) {
    status.className = 'terminal-mini bad';
    status.textContent = `$ feedstr save-link\nerror: ${err.message}`;
    setButtonState(button, 'idle');
  }
}

async function testRelayConnection() {
  const form = document.getElementById('idenstr-config-form');
  const button = document.getElementById('relay-test-btn');
  const out = document.getElementById('relay-test-status');
  const url = form.elements.privateRelayUrl.value.trim();
  if (!url) return showRelayTest(out, 'warn', '$ feedstr relay-test\nenter a ws:// relay URL first');
  if (!/^wss?:\/\//i.test(url)) return showRelayTest(out, 'bad', '$ feedstr relay-test\nURL must start with ws:// or wss://');

  setButtonState(button, 'busy', 'Testing...');
  showRelayTest(out, 'running', `$ feedstr relay-test\nconnecting to ${url} ...`);
  const result = await probeRelay(url, 6000);
  if (result.ok) {
    const nostr = result.nostrMs != null
      ? `\nrelay answered REQ in ${result.nostrMs}ms — speaks Nostr`
      : '\nsocket open, but no EOSE within timeout (reachable, response unconfirmed)';
    showRelayTest(out, 'ok', `$ feedstr relay-test\nconnected in ${result.openMs}ms${nostr}`);
    setButtonState(button, 'done', 'Reachable');
    setTimeout(() => setButtonState(button, 'idle'), 1600);
  } else {
    showRelayTest(out, 'bad', `$ feedstr relay-test\nfailed: ${result.error}`);
    setButtonState(button, 'idle');
  }
}

// Probe the relay the same way the feed does: open a WebSocket from this browser,
// then send a tiny REQ and wait for EOSE/EVENT to confirm it speaks Nostr.
function probeRelay(url, timeoutMs) {
  return new Promise((resolve) => {
    const start = performance.now();
    let openMs = null;
    let settled = false;
    let ws;
    const done = (result) => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      try { ws && ws.close(); } catch {}
      resolve(result);
    };
    const timer = setTimeout(() => {
      done(openMs != null ? { ok: true, openMs, nostrMs: null } : { ok: false, error: 'timed out — relay not reachable from this browser (check address, port, and that you are on the same LAN/Tailnet)' });
    }, timeoutMs);
    try { ws = new WebSocket(url); } catch (err) { return done({ ok: false, error: err.message }); }
    ws.onopen = () => {
      openMs = Math.round(performance.now() - start);
      try { ws.send(JSON.stringify(['REQ', 'feedstr-relay-test', { kinds: [1], limit: 1 }])); } catch {}
    };
    ws.onmessage = (msg) => {
      try {
        const data = JSON.parse(msg.data);
        if (data[0] === 'EOSE' || data[0] === 'EVENT') {
          try { ws.send(JSON.stringify(['CLOSE', 'feedstr-relay-test'])); } catch {}
          done({ ok: true, openMs, nostrMs: Math.round(performance.now() - start) });
        }
      } catch {}
    };
    ws.onerror = () => done(openMs != null ? { ok: true, openMs, nostrMs: null } : { ok: false, error: 'connection failed — address unreachable or port closed' });
    ws.onclose = () => done(openMs != null ? { ok: true, openMs, nostrMs: null } : { ok: false, error: 'closed before opening — unreachable or wrong port' });
  });
}

function showRelayTest(el, cls, text) {
  if (!el) return;
  el.className = `terminal-mini ${cls}`;
  el.classList.remove('hidden');
  el.textContent = text;
}

function setButtonState(button, stateName, text) {
  if (!button) return;
  if (!button.dataset.originalText) button.dataset.originalText = button.textContent;
  button.classList.remove('busy', 'done');
  button.disabled = false;
  if (stateName === 'busy') {
    button.classList.add('busy');
    button.disabled = true;
    if (text) button.textContent = text;
  } else if (stateName === 'done') {
    button.classList.add('done');
    if (text) button.textContent = text;
  } else {
    button.textContent = button.dataset.originalText;
  }
}

// -- relay connections --
function connectRelays() {
  const relays = [...new Set([...state.relays.read, ...state.relays.write])];
  for (const url of relays) connectRelay(url);
}

function connectRelay(url) {
  if (state.sockets.has(url)) return;
  let ws;
  try {
    ws = new WebSocket(url);
  } catch { return; }

  ws.onopen = () => {
    state.sockets.set(url, ws);
    state._relayRetries?.delete(url);
    distributeSubscriptions();
    refreshVisibleMissingProfiles();
    // The private relay vaults every event you signed, so backfill your own
    // kind:7 reactions from it once to light up hearts on previously liked notes.
    if (url === state.config?.privateRelayUrl && !state._likedBackfilled) {
      state._likedBackfilled = true;
      backfillLiked();
    }
  };

  ws.onmessage = (msg) => {
    try {
      const data = JSON.parse(msg.data);
      if (data[0] === 'EVENT') handleEvent(data[1], data[2]);
      if (data[0] === 'EOSE') handleEose(data[1]);
    } catch {}
  };

  ws.onclose = () => {
    state.sockets.delete(url);
    if (!state._relayRetries) state._relayRetries = new Map();
    const attempts = (state._relayRetries.get(url) ?? 0) + 1;
    state._relayRetries.set(url, attempts);
    // Exponential backoff with jitter, capped at 30s, so a dead relay isn't
    // reconnected every 5s indefinitely.
    const delay = Math.min(30000, 1000 * 2 ** Math.min(attempts, 5)) + Math.random() * 1000;
    setTimeout(() => connectRelay(url), delay);
  };

  ws.onerror = () => ws.close();
}

// spread subscriptions across relays so they process in parallel
function distributeSubscriptions() {
  const sockets = [...state.sockets.values()].filter(ws => ws.readyState === WebSocket.OPEN);
  if (!sockets.length) return;
  const subs = [...state.subs.entries()];
  for (let i = 0; i < subs.length; i++) {
    const [subId, sub] = subs[i];
    // Timelines are round-robin sampled for performance, but notification and
    // profile lookups must fan out to every connected relay. Otherwise people
    // who only appear on a relay outside the sampled 2-3 relays seem to vanish.
    const count = sub.allRelays ? sockets.length : Math.min(3, sockets.length);
    for (let j = 0; j < count; j++) {
      const ws = sockets[(i + j) % sockets.length];
      ws.send(JSON.stringify(['REQ', subId, ...sub.filters]));
    }
  }
}

function sendToAll(msg) {
  const payload = JSON.stringify(msg);
  for (const ws of state.sockets.values()) {
    if (ws.readyState === WebSocket.OPEN) ws.send(payload);
  }
}

function sendProfileReqToDiscoveryRelays(subId, filter) {
  const payload = JSON.stringify(['REQ', subId, filter]);
  for (const url of profileDiscoveryRelays) {
    let ws = state.profileSockets.get(url);
    if (ws?.readyState === WebSocket.OPEN) {
      ws.send(payload);
      continue;
    }
    if (ws && ws.readyState === WebSocket.CONNECTING) {
      ws.addEventListener('open', () => ws.send(payload), { once: true });
      continue;
    }
    try {
      ws = new WebSocket(url);
    } catch { continue; }
    state.profileSockets.set(url, ws);
    ws.addEventListener('open', () => ws.send(payload), { once: true });
    ws.onmessage = (msg) => {
      try {
        const data = JSON.parse(msg.data);
        if (data[0] === 'EVENT') handleEvent(data[1], data[2]);
        if (data[0] === 'EOSE') handleEose(data[1]);
      } catch {}
    };
    ws.onclose = () => state.profileSockets.delete(url);
    ws.onerror = () => {};
  }
}

function subscribe(subId, filters, columnId, options = {}) {
  state.subs.set(subId, { filters, columnId, allRelays: Boolean(options.allRelays) });
  const sockets = [...state.sockets.values()].filter(ws => ws.readyState === WebSocket.OPEN);
  if (!sockets.length) return;
  const count = options.allRelays ? sockets.length : Math.min(3, sockets.length);
  const offset = state.subs.size;
  for (let j = 0; j < count; j++) {
    sockets[(offset + j) % sockets.length].send(JSON.stringify(['REQ', subId, ...filters]));
  }
}

function unsubscribe(subId) {
  state.subs.delete(subId);
  sendToAll(['CLOSE', subId]);
}

// Insert into an array kept sorted descending by created_at, using binary search
// for the position. Avoids re-sorting the whole column on every incoming event.
function insertEventSorted(events, event) {
  const ts = event.created_at ?? 0;
  let lo = 0, hi = events.length;
  while (lo < hi) {
    const mid = (lo + hi) >> 1;
    if ((events[mid].created_at ?? 0) > ts) lo = mid + 1;
    else hi = mid;
  }
  events.splice(lo, 0, event);
}

// -- event handling --
function handleEvent(subId, event) {
  if (!event || !event.id) return;

  // private-relay backfill of your own kind:7 reactions — record liked note ids
  // without caching the reaction events themselves.
  const backfillSub = state.subs.get(subId);
  if (backfillSub?.likedBackfill) {
    const likedId = firstTagValue(event, 'e');
    if (likedId) {
      if (!state.liked.has(likedId)) {
        state.liked.add(likedId);
        backfillSub._found = (backfillSub._found ?? 0) + 1;
      }
      state.likeEvents.set(likedId, event.id); // remember reaction id so it can be un-liked
    }
    return;
  }

  // reply-count subscription: tally toward tracked notes, don't add to a column.
  if (backfillSub?.replyCount) {
    registerReplyEvent(event);
    return;
  }

  // engagement-count subscription: tally reposts (kind:6) and reactions (kind:7).
  if (backfillSub?.engagementCount) {
    registerEngagementEvent(event);
    return;
  }

  // thread-replies subscription: cache the reply so the open thread can show it.
  if (backfillSub?.threadReplies) {
    if (event.kind === 1) {
      state.notes.set(event.id, event);
      const actor = getEventActorPubkey(event);
      if (profileNeedsRefresh(actor)) queueProfileFetch(actor);
      const col = state.columns.find(c => c.id === backfillSub.columnId);
      if (col?.thread) scheduleThreadRerender(col);
    }
    return;
  }

  // cache note
  if (event.kind === 1 || event.kind === 6 || event.kind === 7 || event.kind === 9735) {
    state.notes.set(event.id, event);
  }

  // cache profile
  if (event.kind === 0) {
    const existing = state.profiles.get(event.pubkey);
    let changed = false;
    if (!existing || event.created_at > (existing.created_at ?? 0)) {
      try {
        const profile = JSON.parse(event.content);
        const next = { ...profile, created_at: event.created_at };
        changed = profileDisplayChanged(existing, next);
        state.profiles.set(event.pubkey, next);
        // Profile is now complete — stop tracking retries for it so these guard
        // sets stay bounded to pubkeys we're still chasing.
        if (next.picture) {
          state.profileFetchAttempts.delete(event.pubkey);
          state.profileFetchTried.delete(event.pubkey);
        }
      } catch {}
    }
    if (changed) {
      updateOpenZapModal(event.pubkey);
      rerenderColumnsForAuthor(event.pubkey);
      rerenderColumnsForReferencedProfile(event.pubkey);
    }
    return;
  }

  // route to column
  const sub = state.subs.get(subId);
  if (!sub) return;
  const col = state.columns.find(c => c.id === sub.columnId);
  if (!col) return;

  if (!col.events) col.events = [];
  if (!col._ids) col._ids = new Set(col.events.map(e => e.id));
  if (col._ids.has(event.id)) return;
  col._ids.add(event.id);
  // Keep the array sorted-desc by created_at with O(log n) placement instead of a
  // full re-sort on every event; trim the oldest past the 500 cap.
  insertEventSorted(col.events, event);
  if (col.events.length > 500) {
    for (const e of col.events.splice(500)) col._ids.delete(e.id);
  }

  // queue profile fetch for visible actors whose cache is missing or lacks an avatar.
  // Idenstr's following directory can provide names without pictures, so presence
  // in state.profiles is not enough for mention/notification avatars.
  const actorPubkey = getEventActorPubkey(event);
  if (profileNeedsRefresh(actorPubkey)) queueProfileFetch(actorPubkey);

  // Don't repaint while a thread is open over this column — it would reset the
  // reader's scroll. The cached events are still stored for when they go back.
  if (!col.thread) scheduleRenderColumnFeed(col);
  scheduleCacheColumn(col);
}

function handleEose(subId) {
  const sub = state.subs.get(subId);
  if (!sub) return;
  if (sub.likedBackfill) {
    unsubscribe(subId);
    if (sub._found) {
      persistLiked();
      scheduleRerenderAllColumns();
    }
    return;
  }
  if (sub.oneshot) {
    unsubscribe(subId);
    if (sub.embedded) {
      scheduleRerenderAllColumns();
    }
    for (const col of state.columns) {
      if (col.type === 'mentions' || col.type === 'notifications') renderColumnFeed(col);
    }
    return;
  }
}

// -- on-demand profile fetch for visible note authors --
let _profileTimer = null;
function profileNeedsRefresh(pubkey, options = {}) {
  if (!pubkey) return false;
  const profile = state.profiles.get(pubkey);
  const attempts = state.profileFetchAttempts.get(pubkey) ?? 0;
  const needsCoreProfile = !profile || !profile.picture;
  const needsZapAddress = Boolean(options.needZap) && !zapAddressForProfile(profile ?? {});
  return (needsCoreProfile || needsZapAddress) && attempts < 4;
}

function profileDisplayChanged(existing, next) {
  if (!existing) return true;
  const fields = ['name', 'display_name', 'displayName', 'picture', ...ZAP_ADDRESS_FIELD_NAMES];
  return fields.some(field => (existing?.[field] ?? '') !== (next?.[field] ?? '')) || zapAddressForProfile(existing) !== zapAddressForProfile(next);
}

function queueProfileFetch(pubkey, options = {}) {
  if (!options.force && !profileNeedsRefresh(pubkey, options)) return;
  if (!state._profileQueue) state._profileQueue = new Set();
  if (!state._profileForceQueue) state._profileForceQueue = new Set();
  state._profileQueue.add(pubkey);
  if (options.force) state._profileForceQueue.add(pubkey);
  scheduleProfileFetch();
}

function scheduleProfileFetch() {
  if (_profileTimer) return;
  _profileTimer = setTimeout(() => {
    _profileTimer = null;
    const queue = state._profileQueue;
    if (!queue || !queue.size) return;
    const forceQueue = state._profileForceQueue ?? new Set();
    const pubkeys = [...queue].filter(pubkey => forceQueue.has(pubkey) || profileNeedsRefresh(pubkey)).slice(0, 50);
    for (const pubkey of pubkeys) {
      queue.delete(pubkey);
      forceQueue.delete(pubkey);
      state.profileFetchTried.add(pubkey);
      state.profileFetchAttempts.set(pubkey, (state.profileFetchAttempts.get(pubkey) ?? 0) + 1);
    }
    if (!pubkeys.length) return;
    const subId = `profiles_${Date.now()}`;
    const filter = { kinds: [0], authors: pubkeys, limit: pubkeys.length };
    // one-shot REQ, auto-close on EOSE. Ask every connected relay because
    // profile metadata may live on different relays than the note itself.
    state.subs.set(subId, { filters: [filter], columnId: null, oneshot: true, allRelays: true });
    sendToAll(['REQ', subId, filter]);
    sendProfileReqToDiscoveryRelays(subId, filter);
    if (queue.size) scheduleProfileFetch();
  }, 350);
}

// Coalesce the full column scan: every relay that connects calls this, so at boot
// a dozen sockets would otherwise each walk all events. One pass covers them all.
let _missingProfilesTimer = null;
function refreshVisibleMissingProfiles() {
  if (_missingProfilesTimer) return;
  _missingProfilesTimer = setTimeout(() => {
    _missingProfilesTimer = null;
    for (const col of state.columns) {
      for (const event of col.events ?? []) {
        for (const pubkey of getEventProfilePubkeys(event)) {
          if (profileNeedsRefresh(pubkey)) queueProfileFetch(pubkey);
        }
      }
    }
  }, 300);
}

// Parsing an event's referenced profile pubkeys means a regex pass over its
// content, and this runs across every event in every column on each profile
// update — so memoize the result per event id (an event is immutable).
const _profilePubkeyCache = new Map();
function getEventProfilePubkeys(event) {
  if (!event?.id) return computeEventProfilePubkeys(event);
  const cached = _profilePubkeyCache.get(event.id);
  if (cached) return cached;
  const result = computeEventProfilePubkeys(event);
  _profilePubkeyCache.set(event.id, result);
  return result;
}

function computeEventProfilePubkeys(event) {
  const pubkeys = new Set();
  const actorPubkey = getEventActorPubkey(event);
  if (actorPubkey) pubkeys.add(actorPubkey);
  for (const tag of event?.tags ?? []) {
    if (tag[0] === 'p' && isHex(tag[1], 64)) pubkeys.add(tag[1]);
  }
  for (const ref of extractNostrRefs(expandIndexedNostrReferences(event?.content ?? '', event), { queue: false }).filter(ref => ref.kind === 'profile')) {
    if (ref.pubkey) pubkeys.add(ref.pubkey);
  }
  return [...pubkeys];
}

function handleAvatarImageError(img) {
  const pubkey = img?.dataset?.pubkey;
  img?.remove();
  if (!pubkey) return;
  const profile = state.profiles.get(pubkey);
  if (profile?.picture) {
    state.profiles.set(pubkey, { ...profile, picture_failed: profile.picture, picture: '' });
  }
  // A broken image means cached metadata was unusable. Retry kind:0 lookups
  // across connected relays instead of keeping the purple placeholder forever.
  state.profileFetchTried.delete(pubkey);
  queueProfileFetch(pubkey);
}

// Coalesce repaints for a column. Relays stream events independently, so a
// single scroll of the feed can trigger dozens of render requests in one frame;
// batching them into one paint per animation frame is what stops the feed from
// flashing as different relays answer at different times.
const _colRenderFrames = new Map();
function scheduleRenderColumnFeed(col) {
  if (!col?.id) return;
  if (_colRenderFrames.has(col.id)) return;
  _colRenderFrames.set(col.id, requestAnimationFrame(() => {
    _colRenderFrames.delete(col.id);
    renderColumnFeed(col);
  }));
}

function rerenderColumnsForAuthor(pubkey) {
  for (const col of state.columns) {
    if ((col.events ?? []).some(event => getEventActorPubkey(event) === pubkey || event.pubkey === pubkey)) scheduleRenderColumnFeed(col);
  }
}

function rerenderColumnsForReferencedProfile(pubkey) {
  for (const col of state.columns) {
    if ((col.events ?? []).some(event => getEventProfilePubkeys(event).includes(pubkey))) scheduleRenderColumnFeed(col);
  }
}

function rerenderAllColumns() {
  for (const col of state.columns) renderColumnFeed(col);
}

let _rerenderAllTimer = null;
function scheduleRerenderAllColumns() {
  if (_rerenderAllTimer) return;
  _rerenderAllTimer = setTimeout(() => {
    _rerenderAllTimer = null;
    rerenderAllColumns();
  }, 250);
}

function fetchEmbeddedEvent(eventId, relayHints = []) {
  if (!eventId || state.notes.has(eventId) || state.embeddedEventFetchTried.has(eventId)) return;
  state.embeddedEventFetchTried.add(eventId);
  if (!state._embeddedQueue) state._embeddedQueue = new Map();
  state._embeddedQueue.set(eventId, relayHints);
  scheduleEmbeddedFetch();
}

let _embeddedFetchTimer = null;
function scheduleEmbeddedFetch() {
  if (_embeddedFetchTimer) return;
  _embeddedFetchTimer = setTimeout(() => {
    _embeddedFetchTimer = null;
    const queue = state._embeddedQueue;
    if (!queue?.size) return;
    const entries = [...queue.entries()].slice(0, 50);
    for (const [eventId] of entries) queue.delete(eventId);
    const ids = entries.map(([eventId]) => eventId);
    const subId = `embed_${Date.now()}`;
    const filter = { kinds: [1], ids, limit: ids.length };
    state.subs.set(subId, { filters: [filter], columnId: null, oneshot: true, embedded: true, allRelays: true });
    const hintSockets = [...new Set(entries.flatMap(([, hints]) => hints ?? []))]
      .map(url => state.sockets.get(url))
      .filter(ws => ws?.readyState === WebSocket.OPEN);
    for (const ws of hintSockets) ws.send(JSON.stringify(['REQ', subId, filter]));
    sendToAll(['REQ', subId, filter]);
    if (queue.size) scheduleEmbeddedFetch();
  }, 350);
}

// -- column rendering --
function renderColumns() {
  const container = document.getElementById('columns');
  container.innerHTML = '';
  const listEl = document.getElementById('column-list');
  listEl.innerHTML = '';
  for (const col of state.columns) buildColumnDom(col, container, listEl);
  saveColumns();
}

// Build the sidebar entry, column element, and subscription for a single column.
// Used both for the full render (boot) and for appending one new column, so
// adding a column doesn't tear down and re-subscribe every other column.
function buildColumnDom(col, container, listEl) {
  const sideItem = document.createElement('div');
  sideItem.className = 'sidebar-column-item';
  sideItem.dataset.sideCol = col.id;

  const jumpButton = document.createElement('button');
  jumpButton.className = 'sidebar-item sidebar-column-jump';
  jumpButton.type = 'button';
  jumpButton.innerHTML = `<span class="sidebar-column-name">${esc(col.name)}</span>`;
  jumpButton.onclick = () => {
    closeMobileMenu();
    document.querySelector(`.column[data-col="${col.id}"]`)?.scrollIntoView({ behavior: 'smooth', inline: 'start' });
  };

  const closeButton = document.createElement('button');
  closeButton.className = 'sidebar-column-close';
  closeButton.type = 'button';
  closeButton.title = `Close ${col.name}`;
  closeButton.setAttribute('aria-label', `Close ${col.name} column`);
  closeButton.innerHTML = iconSvg('x');
  closeButton.onclick = (event) => {
    event.stopPropagation();
    removeColumn(col.id);
  };

  sideItem.append(jumpButton, closeButton);
  listEl.appendChild(sideItem);

  const colEl = document.createElement('div');
  colEl.className = 'column';
  colEl.dataset.col = col.id;
  colEl.innerHTML = `
    <div class="column-header">${columnHeaderHtml(col)}</div>
    <div class="column-feed">
      ${emptyState('Waiting for notes', 'Live updates will appear here')}
    </div>
  `;
  wireColumnHeader(colEl, col);
  container.appendChild(colEl);

  if (!col.events) col.events = [];
  startColumnSub(col);
}

// Column header swaps to a "Thread" + back-arrow layout while a conversation is
// open in that column, so threads read as in-place navigation, not a popup.
function columnHeaderHtml(col) {
  if (col.thread) {
    return `
      <div class="column-head-thread">
        <button class="column-btn" data-action="thread-back" title="Back">${iconSvg('arrow-left')}</button>
        <div class="column-title">Thread</div>
      </div>
      <div class="column-actions"></div>
    `;
  }
  return `
    <div class="column-head-main">
      <div class="column-title">${esc(col.name)}</div>
      <div class="column-subtitle">${columnSubtitle(col)}</div>
    </div>
    <div class="column-actions">
      ${col.type === 'profile' && col.pubkey ? `<button class="follow-toggle${isFollowing(col.pubkey) ? ' following' : ''}" data-action="follow-toggle" title="${isFollowing(col.pubkey) ? 'Unfollow' : 'Follow'}">${isFollowing(col.pubkey) ? 'Following' : '+ Follow'}</button>` : ''}
      ${col.type === 'profile' && col.pubkey ? `<button class="follow-toggle mute-profile-toggle${isMutedProfile(col.pubkey) ? ' following' : ''}" data-action="mute-profile-toggle" title="${isMutedProfile(col.pubkey) ? 'Unmute profile' : 'Mute profile'}">${isMutedProfile(col.pubkey) ? 'Muted' : 'Mute'}</button>` : ''}
      <button class="column-btn" data-action="reload" title="Reload">${iconSvg('reload')}</button>
      ${col.type === 'custom' ? `<button class="column-btn" data-action="edit" title="Edit">${iconSvg('settings')}</button>` : ''}
      <button class="column-btn" data-action="close" title="Remove">${iconSvg('x')}</button>
    </div>
  `;
}

function wireColumnHeader(colEl, col) {
  colEl.querySelector('[data-action="reload"]')?.addEventListener('click', () => reloadColumn(col));
  colEl.querySelector('[data-action="close"]')?.addEventListener('click', () => removeColumn(col.id));
  colEl.querySelector('[data-action="edit"]')?.addEventListener('click', () => editCustomColumn(col));
  colEl.querySelector('[data-action="thread-back"]')?.addEventListener('click', () => closeThread(col));
  colEl.querySelector('[data-action="follow-toggle"]')?.addEventListener('click', () => toggleFollow(col));
  colEl.querySelector('[data-action="mute-profile-toggle"]')?.addEventListener('click', () => toggleMuteProfile(col));
}

function updateColumnHeader(col) {
  const colEl = document.querySelector(`[data-col="${col.id}"]`);
  if (!colEl) return;
  colEl.classList.toggle('thread-open', Boolean(col.thread));
  const header = colEl.querySelector('.column-header');
  header.innerHTML = columnHeaderHtml(col);
  wireColumnHeader(colEl, col);
}

function columnSubtitle(col) {
  if (col.type === 'home') return 'Your posts';
  if (col.type === 'following') return 'Following timeline';
  if (col.type === 'mentions') return 'Legacy mentions';
  if (col.type === 'hashtag') return `#${col.tag}`;
  if (col.type === 'profile') return shortNpub(col.pubkey);
  if (col.type === 'notifications') return 'Replies, mentions, reactions, reposts, zaps';
  if (col.type === 'custom') return `${(col.pubkeys ?? []).length} accounts`;
  return '';
}

function startColumnSub(col) {
  const subId = `col_${col.id}`;
  unsubscribe(subId);

  const now = Math.floor(Date.now() / 1000);
  const since = now - 86400; // last 24h
  let filters;

  const followPubkeys = state.following.map(f => f.pubkey).filter(Boolean);

  switch (col.type) {
    case 'home':
      if (!state.identity?.pubkey) return;
      filters = [{ kinds: [1], authors: [state.identity.pubkey], since: now - 86400 * 30, limit: 100 }];
      break;
    case 'following':
      if (!followPubkeys.length) return;
      filters = [{ kinds: [1], authors: followPubkeys, since, limit: 100 }];
      break;
    case 'mentions':
      if (!state.identity?.pubkey) return;
      filters = [{ kinds: [1], '#p': [state.identity.pubkey], since, limit: 100 }];
      break;
    case 'hashtag':
      if (!col.tag) return;
      filters = [{ kinds: [1], '#t': [col.tag.toLowerCase()], since, limit: 100 }];
      break;
    case 'profile':
      if (!col.pubkey) return;
      filters = [{ kinds: [1], authors: [col.pubkey], since: now - 86400 * 7, limit: 100 }];
      break;
    case 'notifications':
      if (!state.identity?.pubkey) return;
      // Notifications are a finite per-user stream, so reach back much further
      // than the 24h timeline window and lift the cap — otherwise replies,
      // reactions, reposts and zaps older than a day silently never load.
      filters = [{ kinds: [1, 6, 7, 9735], '#p': [state.identity.pubkey], since: now - 86400 * 30, limit: 500 }];
      break;
    case 'custom':
      if (!col.pubkeys?.length) return;
      filters = [{ kinds: [1], authors: col.pubkeys, since, limit: 100 }];
      break;
    default: return;
  }

  // Profiles are fetched on-demand for visible note authors so mentions and
  // notifications can resolve avatars even when Idenstr's local directory only
  // had a name/pubkey cache.
  if (col.type === 'profile') {
    filters.push({ kinds: [0], authors: [col.pubkey], limit: 1 });
  }

  subscribe(subId, filters, col.id, { allRelays: col.type === 'notifications' || col.type === 'mentions' });
}

// One consistent empty/waiting state across every column and the notifications feed.
function emptyState(text, sub = '') {
  return `<div class="column-empty">
    <div class="column-empty-icon">${iconSvg('inbox')}</div>
    <div class="column-empty-text">${esc(text)}</div>
    ${sub ? `<div class="column-empty-sub">${esc(sub)}</div>` : ''}
  </div>`;
}

function renderColumnFeed(col) {
  const feedEl = document.querySelector(`[data-col="${col.id}"] .column-feed`);
  if (!feedEl) return;

  if (col.thread) return renderThread(col, feedEl);
  if (col.type === 'notifications') return renderNotificationFeed(col, feedEl);

  const events = (col.events ?? [])
    .filter(e => e.kind === 1 && !isMuted(e))
    .slice(0, 200);

  if (!events.length) {
    feedEl.innerHTML = emptyState('No notes yet', 'Nothing from this source in the last 24h');
    return;
  }

  const scrollTop = feedEl.scrollTop;
  const wasAtTop = scrollTop < 20;

  reconcileChildren(feedEl, events, {
    keyOf: e => e.id,
    sigOf: e => noteProfileSignature(e),
    build: e => renderNote(e),
    patch: (el, e) => updateNoteProfile(el, e)
  });

  if (wasAtTop) feedEl.scrollTop = 0;
  else feedEl.scrollTop = scrollTop;

  // Show "N replies" on your own posts in Home.
  if (col.type === 'home') scheduleReplyCounts(col);
  // Show repost/reaction counts on every feed.
  scheduleEngagementCounts(col);
  // Surface newly-arrived notes when the reader is scrolled away from the top.
  updateNewNotesPill(col, feedEl, events, wasAtTop);
}

// A floating "N new notes" pill: when fresh notes land while the reader is scrolled
// down, the feed doesn't yank them to the top — this pill lets them jump up on tap.
function updateNewNotesPill(col, feedEl, events, wasAtTop) {
  const colEl = feedEl.closest('.column');
  if (!colEl) return;
  const newestId = events[0]?.id;

  if (wasAtTop || !col._lastTopId) {
    col._lastTopId = newestId;
    colEl.querySelector('.new-notes-pill')?.remove();
    return;
  }

  const idx = events.findIndex(e => e.id === col._lastTopId);
  const count = idx === -1 ? events.length : idx;
  let pill = colEl.querySelector('.new-notes-pill');
  if (count <= 0) { pill?.remove(); return; }

  if (!pill) {
    pill = document.createElement('button');
    pill.className = 'new-notes-pill';
    pill.onclick = () => {
      feedEl.scrollTo({ top: 0, behavior: 'smooth' });
      col._lastTopId = newestId;
      pill.remove();
    };
    colEl.appendChild(pill);
  }
  pill.textContent = `${count} new note${count === 1 ? '' : 's'}`;

  if (!feedEl.dataset.pillBound) {
    feedEl.dataset.pillBound = '1';
    feedEl.addEventListener('scroll', () => {
      if (feedEl.scrollTop < 20) {
        colEl.querySelector('.new-notes-pill')?.remove();
        col._lastTopId = (col.events?.filter(e => e.kind === 1 && !isMuted(e))[0])?.id;
      }
    });
  }
}

function renderNotificationFeed(col, feedEl) {
  const notifications = (col.events ?? [])
    .map(normalizeNotification)
    .filter(Boolean)
    .filter(n => !isMutedNotification(n))
    .sort((a, b) => (b.createdAt ?? 0) - (a.createdAt ?? 0))
    .slice(0, 500);
  const counts = notificationCounts(notifications);
  const activeFilter = col.notificationFilter || 'all';
  const visible = notifications.filter(n => activeFilter === 'all' || n.type === activeFilter);
  const scrollTop = feedEl.scrollTop;
  const wasAtTop = scrollTop < 20;

  // Keep the filter bar pinned as the first child and rebuild it in place (it
  // has no avatars, so nothing reloads) so counts and the active filter stay
  // fresh. Rows are then reconciled after it, the same as the note feed.
  let header = feedEl.querySelector(':scope > .notification-filters');
  const freshHeader = renderNotificationFilters(col, counts);
  if (header) header.replaceWith(freshHeader);
  else feedEl.prepend(freshHeader);
  header = freshHeader;

  feedEl.querySelector(':scope > .notification-empty')?.remove();

  if (!visible.length) {
    for (const row of feedEl.querySelectorAll(':scope > .notification-row')) row.remove();
    const empty = document.createElement('div');
    empty.className = 'notification-empty';
    empty.innerHTML = notifications.length
      ? emptyState('Nothing here', 'No notifications match this filter')
      : emptyState('No notifications yet', 'Replies, mentions, reposts, reactions and zaps land here');
    feedEl.appendChild(empty);
  } else {
    reconcileChildren(feedEl, visible, {
      keyOf: n => n.id,
      sigOf: n => actorProfileSignature(n.actorPubkey),
      build: n => renderNotificationRow(n, col),
      patch: (el, n) => updateNotificationRowProfile(el, n),
      after: header
    });
  }

  if (wasAtTop) feedEl.scrollTop = 0;
  else feedEl.scrollTop = scrollTop;
}

function renderNotificationFilters(col, counts) {
  const wrap = document.createElement('div');
  wrap.className = 'notification-filters';
  const filters = [
    ['all', 'All'],
    ['reply', 'Replies'],
    ['mention', 'Mentions'],
    ['zap', 'Zaps'],
    ['repost', 'Reposts'],
    ['reaction', 'Reactions']
  ];
  const active = col.notificationFilter || 'all';
  for (const [key, label] of filters) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = `notification-filter${active === key ? ' active' : ''} ${key}`;
    btn.title = `${label} ${counts[key] ?? 0}`;
    btn.setAttribute('aria-label', `${label} ${counts[key] ?? 0}`);
    btn.innerHTML = `
      <span class="notification-filter-icon">${notificationFilterIcon(key)}</span>
      <span class="notification-filter-label">${esc(label)}</span>
      <span class="notification-filter-count">${esc(counts[key] ?? 0)}</span>
    `;
    btn.addEventListener('click', () => {
      col.notificationFilter = key;
      saveColumns();
      renderColumnFeed(col);
    });
    wrap.appendChild(btn);
  }
  return wrap;
}

function notificationFilterIcon(type) {
  if (type === 'all') return iconSvg('bell');
  if (type === 'reply') return iconSvg('reply');
  if (type === 'mention') return iconSvg('at');
  if (type === 'zap') return iconSvg('zap');
  if (type === 'repost') return iconSvg('repost');
  if (type === 'reaction') return iconSvg('heart');
  return iconSvg('bell');
}

function notificationCounts(notifications) {
  const counts = { all: notifications.length, reply: 0, mention: 0, zap: 0, repost: 0, reaction: 0 };
  for (const n of notifications) counts[n.type] = (counts[n.type] ?? 0) + 1;
  return counts;
}

function normalizeNotification(event) {
  if (!event || !state.identity?.pubkey) return null;
  const tags = event.tags ?? [];
  const mentionsMe = tags.some(tag => tag[0] === 'p' && tag[1] === state.identity.pubkey);
  if (!mentionsMe) return null;

  if (event.kind === 1) {
    const hasEventTag = tags.some(tag => tag[0] === 'e' && tag[1]);
    return {
      id: event.id,
      type: hasEventTag ? 'reply' : 'mention',
      actorPubkey: event.pubkey,
      targetEventId: firstTagValue(event, 'e'),
      createdAt: event.created_at,
      contentPreview: event.content ?? '',
      rawEvent: event
    };
  }

  if (event.kind === 7) {
    return { id: event.id, type: 'reaction', actorPubkey: event.pubkey, targetEventId: firstTagValue(event, 'e'), createdAt: event.created_at, reaction: event.content || '+', rawEvent: event };
  }

  if (event.kind === 6) {
    return { id: event.id, type: 'repost', actorPubkey: event.pubkey, targetEventId: firstTagValue(event, 'e'), createdAt: event.created_at, rawEvent: event };
  }

  if (event.kind === 9735) {
    return {
      id: event.id,
      type: 'zap',
      actorPubkey: getZapSenderPubkey(event),
      targetEventId: firstTagValue(event, 'e'),
      createdAt: event.created_at,
      amountSats: parseZapAmountSats(event),
      contentPreview: parseZapComment(event),
      rawEvent: event
    };
  }

  return null;
}

function renderNotificationRow(notification, col) {
  const profile = state.profiles.get(notification.actorPubkey) ?? {};
  const name = profile.display_name || profile.displayName || profile.name || shortNpub(notification.actorPubkey);
  const time = relativeTime(notification.createdAt);
  const icon = notificationIcon(notification);
  const summary = notificationSummary(notification);
  const detail = notificationDetail(notification);

  const el = document.createElement('div');
  el.className = `notification-row ${notification.type}`;
  el.dataset.id = notification.id;
  el.innerHTML = `
    <div class="notification-type">${icon}</div>
    ${renderAvatar(profile, notification.actorPubkey, 'notification-avatar')}
    <div class="notification-body">
      <div class="notification-line"><strong>${esc(name)}</strong> <span>${esc(summary)}</span></div>
      ${detail ? `<div class="notification-detail">${detail}</div>` : ''}
    </div>
    <div class="note-time notification-time">${esc(time)}</div>
  `;
  // Tapping the actor's avatar or name opens their profile, matching the feed;
  // tapping anywhere else on the row opens the note (handler below).
  const openActor = (event) => { event.stopPropagation(); openProfileColumn(notification.actorPubkey, name); };
  for (const sel of ['.notification-avatar', '.notification-line > strong']) {
    const target = el.querySelector(sel);
    if (target) { target.style.cursor = 'pointer'; target.addEventListener('click', openActor); }
  }

  const link = notificationLink(notification);
  if (link) {
    el.classList.add('clickable');
    el.title = notification.type === 'reply' || notification.type === 'mention'
      ? 'Open conversation' : 'Open note';
    el.addEventListener('click', (event) => {
      if (event.target.closest('a, button')) return;
      openConversation(link.parentId, link.selectedId, col?.id);
    });
  }
  return el;
}

// Where tapping a notification takes you. Replies open the reply in its thread;
// mentions open the mentioning note itself; reactions/reposts/zaps open the note of
// yours they acted on. Returns null when there's no note to open (e.g. a profile zap).
function notificationLink(n) {
  if (n.type === 'mention') return { parentId: n.id, selectedId: n.id };
  if (n.type === 'reply' && n.targetEventId) return { parentId: n.targetEventId, selectedId: n.id };
  if (n.targetEventId) return { parentId: n.targetEventId, selectedId: n.targetEventId };
  return null;
}

function notificationIcon(notification) {
  if (notification.type === 'zap') return `${iconSvg('zap')}${notification.amountSats ? `<small>${esc(notification.amountSats)}</small>` : ''}`;
  if (notification.type === 'reply') return iconSvg('reply');
  if (notification.type === 'mention') return iconSvg('at');
  if (notification.type === 'repost') return iconSvg('repost');
  if (notification.type === 'reaction') return iconSvg('heart');
  return iconSvg('bell');
}

function notificationSummary(notification) {
  if (notification.type === 'zap') return notification.targetEventId ? 'zapped your note' : 'zapped you';
  if (notification.type === 'reply') return 'replied';
  if (notification.type === 'mention') return 'mentioned you';
  if (notification.type === 'reaction') return 'reacted';
  if (notification.type === 'repost') return 'reposted your note';
  return 'notified you';
}

function notificationDetail(notification) {
  if (notification.type === 'zap') {
    const pieces = [];
    if (notification.amountSats) pieces.push(`${notification.amountSats} sats`);
    if (notification.contentPreview) pieces.push(`“${notification.contentPreview}”`);
    return pieces.map(esc).join(' · ');
  }
  if (notification.type === 'reaction') return esc(notification.reaction || '+');
  if (notification.contentPreview) return formatContent(notification.contentPreview, notification.rawEvent);
  return '';
}

// Fingerprint of a single profile as it would be displayed (name + avatar).
function actorProfileSignature(pubkey) {
  const p = state.profiles.get(pubkey);
  return `${pubkey}:${p?.display_name || p?.displayName || p?.name || ''}:${p?.picture || ''}`;
}

// A compact fingerprint of every profile a note displays (author, repost actor,
// and p-tagged mentions/reply targets). The reconciler compares it to decide
// whether a cached note element can be reused as-is or must be repainted because
// a name or avatar has since loaded.
function noteProfileSignature(event) {
  const pubkeys = new Set([event.pubkey]);
  const actor = getEventActorPubkey(event);
  if (actor) pubkeys.add(actor);
  for (const tag of event.tags ?? []) {
    if (tag[0] === 'p' && isHex(tag[1], 64)) pubkeys.add(tag[1]);
  }
  let sig = '';
  for (const pubkey of pubkeys) sig += actorProfileSignature(pubkey) + '|';
  return sig;
}

// Reconcile a parent's keyed children in place instead of wiping innerHTML.
// Nodes whose id and signature are unchanged are reused untouched — which is
// what keeps their avatar <img> elements alive so they never re-fetch and
// strobe. When a row's signature changes (a name or avatar finally loaded) it is
// updated in place via `patch` if one is given — so the element, its avatar
// <img>, and its :hover state all survive — and only fully rebuilt when no patch
// is supplied. New rows are inserted in order and departed ones removed. `after`
// is an optional fixed leading child (a header or label) the rows stay after.
function reconcileChildren(parent, items, { keyOf, sigOf, build, patch = null, after = null }) {
  const keep = new Set(items.map(item => String(keyOf(item))));
  const existing = new Map();
  const replyBoxes = new Map();
  let node = after ? after.nextSibling : parent.firstChild;
  while (node) {
    const next = node.nextSibling;
    if (node.classList?.contains('reply-box') && node.dataset?.replyFor) {
      if (keep.has(node.dataset.replyFor)) replyBoxes.set(node.dataset.replyFor, node);
      else node.remove();
    }
    else if (node.dataset?.id != null) existing.set(node.dataset.id, node);
    else node.remove(); // stray nodes (e.g. a prior empty-state)
    node = next;
  }
  for (const [id, el] of existing) {
    if (!keep.has(id)) {
      el.remove();
      replyBoxes.get(id)?.remove();
      replyBoxes.delete(id);
      existing.delete(id);
    }
  }
  let prev = after;
  for (const item of items) {
    const id = String(keyOf(item));
    const sig = sigOf(item);
    let el = existing.get(id);
    if (!el) {
      el = build(item);
      el.dataset.id = id;
      el.dataset.sig = sig;
    } else if (el.dataset.sig !== sig) {
      if (patch) {
        patch(el, item);
      } else {
        const fresh = build(item);
        fresh.dataset.id = id;
        el.replaceWith(fresh);
        el = fresh;
      }
      el.dataset.sig = sig;
    }
    const ref = prev ? prev.nextSibling : parent.firstChild;
    if (ref !== el) parent.insertBefore(el, ref);
    const replyBox = replyBoxes.get(id);
    if (replyBox) {
      if (el.nextSibling !== replyBox) parent.insertBefore(replyBox, el.nextSibling);
      prev = replyBox;
    } else {
      prev = el;
    }
  }
}

// Swap an avatar's <img> only when the picture URL actually changed, so a note
// whose profile updated (e.g. just its name) never reloads an unchanged avatar.
function updateAvatarEl(wrap, profile, pubkey) {
  if (!wrap) return;
  const newSrc = profile?.picture || '';
  const img = wrap.querySelector('img');
  const curSrc = img ? (img.getAttribute('src') || '') : '';
  if (newSrc === curSrc) return;
  wrap.innerHTML = newSrc
    ? `<img src="${esc(newSrc)}" data-pubkey="${esc(pubkey)}" loading="lazy" onerror="handleAvatarImageError(this)" />`
    : '';
}

// Update the profile-dependent bits of an existing note (author name, avatar,
// and the "Replying to …" cue) in place, without rebuilding the element.
function updateNoteProfile(el, event) {
  const profile = state.profiles.get(event.pubkey) ?? {};
  const name = profile.display_name || profile.displayName || profile.name || shortNpub(event.pubkey);
  const authorEl = el.querySelector(':scope > .note-header > .note-meta > .note-author');
  if (authorEl) authorEl.textContent = name;
  updateAvatarEl(el.querySelector(':scope > .note-header > .note-avatar'), profile, event.pubkey);

  const rc = el.querySelector(':scope > .reply-context');
  if (rc) {
    const parentRef = getReplyParentRef(event);
    const parent = parentRef?.eventId ? state.notes.get(parentRef.eventId) : null;
    if (parent) {
      const pProfile = state.profiles.get(parent.pubkey) ?? {};
      const pName = pProfile.display_name || pProfile.displayName || pProfile.name || shortNpub(parent.pubkey);
      const span = rc.querySelector('span');
      if (span) span.textContent = `Replying to ${pName}`;
      rc.classList.remove('loading');
    }
  }
}

// Same, for a notification row (actor name + avatar).
function updateNotificationRowProfile(el, notification) {
  const profile = state.profiles.get(notification.actorPubkey) ?? {};
  const name = profile.display_name || profile.displayName || profile.name || shortNpub(notification.actorPubkey);
  const strong = el.querySelector('.notification-line > strong');
  if (strong) strong.textContent = name;
  updateAvatarEl(el.querySelector(':scope > .notification-avatar'), profile, notification.actorPubkey);
}

function renderNote(event, opts = {}) {
  const profile = state.profiles.get(event.pubkey) ?? {};
  const name = profile.display_name || profile.displayName || profile.name || shortNpub(event.pubkey);
  const npub = shortNpub(event.pubkey);
  const time = relativeTime(event.created_at);
  const content = formatContent(event.content, event);
  // In a thread the chain already shows the parent above, so the inline
  // "replying to" line is redundant there.
  const replyContext = opts.thread ? '' : renderReplyContext(event);

  const el = document.createElement('div');
  el.className = `note${opts.thread ? ' thread-note' : ''}${opts.selected ? ' thread-selected' : ''}${opts.reply ? ' thread-reply' : ''}`;
  el.dataset.id = event.id;
  // Records which profile data this note was painted with so renderColumnFeed
  // can tell when a reuse is safe vs. when an avatar/name actually changed.
  el.dataset.sig = noteProfileSignature(event);
  el.innerHTML = `
    ${replyContext}
    <div class="note-header">
      ${renderAvatar(profile, event.pubkey)}
      <div class="note-meta">
        <div class="note-author">${esc(name)}</div>
        <div class="note-npub">${esc(npub)}</div>
      </div>
      <div class="note-time" data-ts="${event.created_at}">${esc(time)}</div>
    </div>
    <div class="note-content">${content}</div>
    <div class="note-actions">
      <button class="note-action" data-action="reply" title="Reply">${iconSvg('reply')}<span>${replyCountLabel(event.id)}</span></button>
      <button class="note-action" data-action="repost" title="Repost">${iconSvg('repost')}<span>${repostCountLabel(event.id)}</span></button>
      <button class="note-action" data-action="quote" title="Quote">${iconSvg('pen')}<span></span></button>
      <button class="note-action zap-action" data-action="zap" title="Zap ${state.zapDefaultSats} sats — hold or right-click for options">${iconSvg('zap')}<span>Zap</span></button>
      <button class="note-action${state.liked.has(event.id) ? ' liked' : ''}" data-action="like" title="Like">${iconSvg('heart')}<span>${reactionCountLabel(event.id)}</span></button>
      <button class="note-action" data-action="mute-thread" title="Mute thread">${iconSvg('volume-x')}<span></span></button>
    </div>
  `;

  el.querySelector('[data-action="reply"]').onclick = () => toggleReply(el, event);
  el.querySelector('[data-action="repost"]').onclick = () => doRepost(event);
  el.querySelector('[data-action="quote"]').onclick = () => quoteNote(event);
  attachZapButton(el.querySelector('[data-action="zap"]'), event);
  el.querySelector('[data-action="like"]').onclick = (e) => doLike(event, e.currentTarget);
  el.querySelector('[data-action="mute-thread"]').onclick = () => muteThread(event);

  // Tapping a name or avatar opens that person's profile column (not the thread).
  const openAuthor = (clickEvent) => {
    clickEvent.stopPropagation();
    openProfileColumn(event.pubkey, name);
  };
  for (const sel of ['.note-author', '.note-avatar']) {
    const target = el.querySelector(sel);
    if (target) { target.style.cursor = 'pointer'; target.addEventListener('click', openAuthor); }
  }
  const parentRef = getReplyParentRef(event);
  el.querySelector('.reply-context')?.addEventListener('click', (clickEvent) => {
    clickEvent.preventDefault();
    if (parentRef?.eventId) openConversation(parentRef.eventId, event.id, el.closest('.column')?.dataset.col);
  });

  // Tap anywhere on a note (outside links/buttons) to open its thread, the way
  // Damus/Nostur do. Ignore taps that are really text selections.
  if (!opts.thread) {
    el.addEventListener('click', (clickEvent) => {
      if (clickEvent.target.closest('a, button')) return;
      if (window.getSelection && String(window.getSelection())) return;
      openConversation(event.id, event.id, el.closest('.column')?.dataset.col);
    });
  }

  return el;
}

function renderReplyContext(event) {
  const parentRef = getReplyParentRef(event);
  if (!parentRef?.eventId || parentRef.eventId === event.id) return '';
  const parent = state.notes.get(parentRef.eventId);
  if (!parent) {
    fetchEmbeddedEvent(parentRef.eventId, parentRef.relays);
    return `
      <button class="reply-context loading" type="button" data-parent-id="${esc(parentRef.eventId)}" data-selected-id="${esc(event.id)}" title="Open conversation">
        ${iconSvg('reply')}<span>Replying to a note</span>
      </button>
    `;
  }

  const profile = state.profiles.get(parent.pubkey) ?? {};
  if (profileNeedsRefresh(parent.pubkey)) queueProfileFetch(parent.pubkey);
  const name = profile.display_name || profile.displayName || profile.name || shortNpub(parent.pubkey);
  return `
    <button class="reply-context" type="button" data-parent-id="${esc(parent.id)}" data-selected-id="${esc(event.id)}" title="Open conversation">
      ${iconSvg('reply')}<span>Replying to ${esc(name)}</span>
    </button>
  `;
}

// Threads open in-place inside the column the note was clicked in, with a back
// arrow in the header — navigation, not a popup dialog.
function openConversation(parentId, selectedId = parentId, columnId = null) {
  const col = columnId ? state.columns.find(c => c.id === columnId) : null;
  if (!col) return;
  if (parentId && !state.notes.has(parentId)) fetchEmbeddedEvent(parentId);
  if (selectedId && !state.notes.has(selectedId)) fetchEmbeddedEvent(selectedId);
  col.thread = { parentId, selectedId };
  closeMobileMenu();
  updateColumnHeader(col);
  fetchThreadReplies(col, selectedId || parentId);
  renderThread(col, undefined, true);
}

function closeThread(col) {
  col.thread = null;
  unsubscribe(`thread_replies_${col.id}`);
  updateColumnHeader(col);
  renderColumnFeed(col);
}

// Live-fetch direct replies to the focused note so they render under it.
function fetchThreadReplies(col, noteId) {
  if (!noteId) return;
  const subId = `thread_replies_${col.id}`;
  unsubscribe(subId);
  const filter = { kinds: [1], '#e': [noteId] };
  state.subs.set(subId, { filters: [filter], columnId: col.id, threadReplies: true, allRelays: true });
  const sockets = [...state.sockets.values()].filter(ws => ws.readyState === WebSocket.OPEN);
  for (const ws of sockets) ws.send(JSON.stringify(['REQ', subId, filter]));
}

// Notes already in cache whose computed reply parent is this note (NIP-10).
function threadRepliesFor(noteId) {
  const out = [];
  for (const ev of state.notes.values()) {
    if (ev.kind !== 1 || ev.id === noteId || isMuted(ev)) continue;
    if (getReplyParentRef(ev)?.eventId === noteId) out.push(ev);
  }
  return out.sort((a, b) => (a.created_at ?? 0) - (b.created_at ?? 0));
}

const threadRerenderTimers = new Map();
function scheduleThreadRerender(col) {
  if (!col?.id) return;
  clearTimeout(threadRerenderTimers.get(col.id));
  threadRerenderTimers.set(col.id, setTimeout(() => {
    threadRerenderTimers.delete(col.id);
    if (col.thread) renderColumnFeed(col);
  }, 300));
}

function renderThread(col, feedEl = document.querySelector(`[data-col="${col.id}"] .column-feed`), scrollToTarget = false) {
  if (!feedEl || !col.thread) return;
  const { parentId, selectedId } = col.thread;
  const focusedId = selectedId || parentId;
  const chain = buildConversationChain(focusedId, parentId);
  const replies = threadRepliesFor(focusedId);
  const prevScroll = feedEl.scrollTop;

  // Build the thread skeleton once, then reconcile its two lists in place so
  // avatars survive the repaints that fire as replies and profiles stream in.
  // Reuse it across renders; if the column was showing something else, the stray
  // nodes are cleared and the skeleton rebuilt.
  let wrap = feedEl.querySelector(':scope > .thread');
  let chainEl, repliesEl, label;
  if (!wrap) {
    feedEl.innerHTML = '';
    wrap = document.createElement('div');
    wrap.className = 'thread';
    chainEl = document.createElement('div');
    chainEl.className = 'thread-chain';
    repliesEl = document.createElement('div');
    repliesEl.className = 'thread-replies';
    label = document.createElement('div');
    label.className = 'thread-replies-label';
    repliesEl.appendChild(label);
    wrap.appendChild(chainEl);
    wrap.appendChild(repliesEl);
    feedEl.appendChild(wrap);
  } else {
    chainEl = wrap.querySelector(':scope > .thread-chain');
    repliesEl = wrap.querySelector(':scope > .thread-replies');
    label = repliesEl.querySelector(':scope > .thread-replies-label');
  }

  // Ancestor chain (root → focused), connected by the thread line. The selected
  // state is folded into the signature so refocusing repaints the right note.
  reconcileChildren(chainEl, chain, {
    keyOf: item => item.id,
    sigOf: item => (item.id === selectedId ? 'sel:' : '') + (item.event ? noteProfileSignature(item.event) : 'missing'),
    build: item => renderThreadNote(item, selectedId)
  });

  // Direct replies to the focused note, listed below.
  label.textContent = replies.length
    ? (replies.length === 1 ? '1 reply' : `${replies.length} replies`)
    : 'No replies yet';
  reconcileChildren(repliesEl, replies, {
    keyOf: r => r.id,
    sigOf: r => noteProfileSignature(r),
    build: r => renderNote(r, { thread: true, reply: true }),
    patch: (el, r) => updateNoteProfile(el, r),
    after: label
  });

  if (scrollToTarget) {
    const targetId = selectedId || parentId;
    setTimeout(() => {
      const escapedId = window.CSS?.escape ? CSS.escape(targetId) : targetId;
      wrap.querySelector(`[data-id="${escapedId}"]`)?.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }, 0);
  } else {
    feedEl.scrollTop = prevScroll;
  }
}

function renderThreadNote(item, selectedId) {
  if (!item.event) {
    fetchEmbeddedEvent(item.id);
    const ph = document.createElement('div');
    ph.className = 'note thread-note thread-missing';
    ph.dataset.id = item.id;
    ph.innerHTML = `<span>Loading note from relays…</span>`;
    return ph;
  }
  return renderNote(item.event, { thread: true, selected: item.id === selectedId });
}

function buildConversationChain(selectedId, fallbackParentId) {
  const ids = [];
  const seen = new Set();
  let currentId = selectedId || fallbackParentId;
  while (currentId && !seen.has(currentId) && ids.length < 12) {
    seen.add(currentId);
    ids.unshift(currentId);
    const event = state.notes.get(currentId);
    if (!event) break;
    const parentRef = getReplyParentRef(event);
    if (!parentRef?.eventId || parentRef.eventId === currentId) break;
    fetchEmbeddedEvent(parentRef.eventId, parentRef.relays);
    currentId = parentRef.eventId;
  }
  if (fallbackParentId && !seen.has(fallbackParentId)) ids.unshift(fallbackParentId);
  return ids.map(id => ({ id, event: state.notes.get(id) }));
}


function getReplyParentRef(event) {
  const eTags = (event?.tags ?? []).filter(tag => tag[0] === 'e' && isHex(tag[1], 64));
  if (!eTags.length) return null;
  const replyTag = eTags.find(tag => tag[3] === 'reply');
  const parentTag = replyTag ?? eTags[eTags.length - 1];
  return { eventId: parentTag[1], relays: parentTag[2] ? [parentTag[2]] : [] };
}

function renderAvatar(profile, pubkey, extraClass = '') {
  const followClass = isFollowing(pubkey) ? ' following' : '';
  const classes = `note-avatar${extraClass ? ` ${extraClass}` : ''}${followClass}`;

}

  const mediaInput = box.querySelector('.reply-media-input');
  const mediaBtn = box.querySelector('.reply-media-btn');
  const mediaStatus = box.querySelector('.reply-media-status');
  const cancelBtn = box.querySelectorAll('button')[1];
