  let mediaUploadInFlight = false;
  mediaBtn.querySelector('.compose-media-icon').innerHTML = iconSvg('image');
  mediaBtn.onclick = () => {
    if (mediaUploadInFlight) return;
    mediaInput.click();
  };
  mediaInput.onchange = async () => {
    if (mediaUploadInFlight) return;
    const file = mediaInput.files?.[0];
    mediaInput.value = '';
    if (!file) return;
    if (!file.type.startsWith('image/')) {
      setInlineMediaStatus(mediaBtn, mediaStatus, 'Images only', true);
      return;
    }
    if (file.size > 20 * 1024 * 1024) {
      setInlineMediaStatus(mediaBtn, mediaStatus, 'Too large', true, 'Images must be under 20 MB.');
      setTimeout(() => setInlineMediaStatus(mediaBtn, mediaStatus, 'Photo', false, ''), 2600);
      return;
    }
    mediaUploadInFlight = true;
    mediaBtn.disabled = true;
    mediaInput.disabled = true;
    setInlineMediaStatus(mediaBtn, mediaStatus, 'Uploading...', false, 'Uploading image to nostr.build...');
    try {
      const url = await uploadComposeMedia(file);
      appendMediaUrlToTextarea(textarea, url);
      setInlineMediaStatus(mediaBtn, mediaStatus, 'Added', false, `Uploaded: ${url}`, url);
      setTimeout(() => setInlineMediaStatus(mediaBtn, mediaStatus, 'Photo', false, ''), 1500);
    } catch (err) {
      console.error('Reply media upload failed:', err);
      setInlineMediaStatus(mediaBtn, mediaStatus, 'Failed', true, err.message || 'Upload failed');
      setTimeout(() => setInlineMediaStatus(mediaBtn, mediaStatus, 'Photo', false, ''), 2200);
    } finally {
      mediaUploadInFlight = false;
      mediaBtn.disabled = false;
      mediaInput.disabled = false;
    }
  };
  cancelBtn.onclick = () => box.remove();
  sendBtn.onclick = async () => {
    const text = textarea.value.trim();
    if (!text) return;
    sendBtn.disabled = true;
    sendBtn.textContent = 'Sending...';
    try {
      await publishEvent(1, text, [
        ['e', event.id, '', 'root'],
        ['p', event.pubkey]
      ]);
      box.remove();
    } catch (err) {
      sendBtn.textContent = 'Failed';
      setTimeout(() => { sendBtn.textContent = 'Reply'; sendBtn.disabled = false; }, 2000);
    }
  };
  noteEl.after(box);
  textarea.focus();
}

// Bolt button: a short tap one-tap zaps the saved default; a deliberate
// long-press (touch or mouse held) or right-click opens the custom modal.
function attachZapButton(button, event) {
  let timer = null;
  let longFired = false;
  const LONG_MS = 700;
  const startHold = () => {
    longFired = false;
    timer = setTimeout(() => { longFired = true; timer = null; showZapModal(event); }, LONG_MS);
  };
  const cancelHold = () => { if (timer) { clearTimeout(timer); timer = null; } };
  button.addEventListener('pointerdown', (e) => { if (e.pointerType === 'mouse' && e.button !== 0) return; startHold(); });
  button.addEventListener('pointerup', cancelHold);
  button.addEventListener('pointerleave', cancelHold);
  button.addEventListener('pointercancel', cancelHold);
  button.addEventListener('contextmenu', (e) => { e.preventDefault(); cancelHold(); longFired = true; showZapModal(event); });
  button.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (longFired) { longFired = false; return; } // the hold already opened the modal
    quickZap(event, button);
  });
}

// Shared zap core used by both one-tap and the modal, so they validate and pay
// identically. Resolves with Idenstr's pay result, or throws a readable error.
async function zapNote({ event, amountSats, comment = '', zapAddress }) {
  const lnurl = zapAddress || zapAddressForProfile(state.profiles.get(event.pubkey) ?? {});
  if (!lnurl) throw new Error('recipient has no zap address in kind:0 metadata');
  if (!Number.isFinite(amountSats) || amountSats < 1) throw new Error('amount must be at least 1 sat');
  return api('/api/v1/idenstr/zaps/pay', {
    method: 'POST',
    body: {
      pubkey: event.pubkey,
      eventId: event.id,
      amountSats,
      comment,
      lnurl,
      relays: [...new Set([...(state.relays.write ?? []), ...(state.relays.read ?? [])])]
    }
  });
}

async function quickZap(event, button) {
  if (button.dataset.zapping === '1') return;
  const amountSats = Number(state.zapDefaultSats) || 100;
  let zapAddress = zapAddressForProfile(state.profiles.get(event.pubkey) ?? {});
  button.dataset.zapping = '1';
  button.style.opacity = '0.5';
  try {
    if (!zapAddress) {
      // Short taps should stay one-tap on mobile: refresh the recipient kind:0
      // metadata in-place instead of opening the custom amount/comment modal.
      queueProfileFetch(event.pubkey, { needZap: true, force: true });
      toast('Checking profile for zap address…', 'info');
      zapAddress = await waitForZapAddress(event.pubkey, 3500);
    }
    const result = await zapNote({ event, amountSats, zapAddress });
    toast(`Zapped ${result.amountSats ?? amountSats} sats`, 'success');
  } catch (err) {
    toast(`Zap failed: ${err.message}`, 'error');
  } finally {
    button.dataset.zapping = '0';
    button.style.opacity = '';
  }
}

function waitForZapAddress(pubkey, timeoutMs = 3500) {
  return new Promise((resolve, reject) => {
    const started = Date.now();
    const tick = () => {
      const zapAddress = zapAddressForProfile(state.profiles.get(pubkey) ?? {});
      if (zapAddress) return resolve(zapAddress);
      if (Date.now() - started >= timeoutMs) return reject(new Error('recipient has no zap address in kind:0 yet; hold the bolt for custom zap details'));
      setTimeout(tick, 150);
    };
    tick();
  });
}

const ZAP_ADDRESS_FIELD_NAMES = [
  'lud16', 'lud06',
  'lightning_address', 'lightningAddress', 'lightning', 'lightningAddressUrl',
  'lnurl', 'lnurlp', 'lnurlPay', 'lnurlpay', 'lnurl_pay',
  'zap', 'zapAddress', 'zap_address'
];
const ZAP_ADDRESS_FIELD_RE = /^(lud16|lud06|lightning[_-]?address|lightning|lnurlp?|lnurl[_-]?pay|zap[_-]?address|zap)$/i;

function zapAddressForProfile(profile = {}) {
  for (const field of ZAP_ADDRESS_FIELD_NAMES) {
    const address = normalizeZapAddress(profile?.[field]);
    if (address) return address;
  }
  return findNestedZapAddress(profile);
}

function findNestedZapAddress(value, depth = 0) {
  if (!value || depth > 2 || typeof value !== 'object') return '';
  for (const [key, child] of Object.entries(value)) {
    if (!ZAP_ADDRESS_FIELD_RE.test(key)) continue;
    const direct = normalizeZapAddress(child);
    if (direct) return direct;
    const nested = findNestedZapAddress(child, depth + 1);
    if (nested) return nested;
  }
  return '';
}

function normalizeZapAddress(value) {
  if (typeof value !== 'string') return '';
  let raw = value.trim();
  if (!raw) return '';
  raw = raw.replace(/^lightning:/i, '').trim();
  if (/^lnurl[0-9a-z]+$/i.test(raw)) return raw;
  if (/^https?:\/\//i.test(raw)) return raw;
  if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(raw)) return raw;
  return '';
}

function updateOpenZapModal(pubkey) {
  const form = document.getElementById('zap-form');

    submit.disabled = false;

async function sendZap(event, form, zapAddress) {
  const submit = form.querySelector('button[type="submit"]');
  const cancel = form.querySelector('[data-zap-cancel]');
  const status = form.querySelector('#zap-status');
  const resolvedZapAddress = zapAddress || zapAddressForProfile(state.profiles.get(event.pubkey) ?? {});
  const amountSats = Number(form.elements.amount.value);
  if (!Number.isFinite(amountSats) || amountSats < 1) {
    status.className = 'terminal-mini error';
    status.textContent = '$ feedstr zap\nerror: enter an amount of at least 1 sat';
    return;
  }
  if (!resolvedZapAddress) {
    status.className = 'terminal-mini warn';
    status.textContent = '$ feedstr zap\nerror: still waiting for a zap address from the recipient profile';
    queueProfileFetch(event.pubkey, { needZap: true, force: true });
    return;
  }
  submit.disabled = true;
  status.className = 'terminal-mini';
  status.textContent = `$ feedstr zap\namount: ${amountSats} sats\nstatus: requesting invoice + paying via Idenstr...`;
  try {
    const result = await zapNote({ event, amountSats, comment: form.elements.comment.value.trim(), zapAddress: resolvedZapAddress });
    status.className = 'terminal-mini ok';
    status.textContent = `$ feedstr zap\nok: paid ${result.amountSats ?? amountSats} sats${result.feesPaid != null ? `\nfee: ${result.feesPaid} msat` : ''}${result.preimage ? `\npreimage: ${result.preimage.slice(0, 16)}…` : ''}`;
    toast(`Zapped ${amountSats} sats`, 'success');
    // The zap is done — drop the dead "Send zap" button and turn the only
    // remaining action into a clear Close.
    submit.remove();
    if (cancel) cancel.textContent = 'Close';
  } catch (err) {
    status.className = 'terminal-mini error';
    status.textContent = `$ feedstr zap\nerror: ${err.message}`;
    toast('Zap failed', 'error');
    submit.disabled = false;
  }
}

async function doLike(event, btn) {
  // Already liked -> undo by deleting our reaction (NIP-09 kind:5).
  if (state.liked.has(event.id)) {
    const reactionId = state.likeEvents.get(event.id);
    btn.classList.remove('liked');
    state.liked.delete(event.id);
    state.likeEvents.delete(event.id);
    persistLiked();
    if (!reactionId) { toast('Like removed', 'success'); return; }
    try {
      await publishEvent(5, '', [['e', reactionId]]);
      toast('Like removed', 'success');
    } catch (err) {
      console.error('Unlike failed:', err);
      toast('Could not remove like', 'error');
    }
    return;
  }
  // Optimistic like.
  btn.classList.add('liked');
  state.liked.add(event.id);
  persistLiked();
  try {
    const { event: reaction } = await publishEvent(7, '+', [
      ['e', event.id],
      ['p', event.pubkey]
    ]);
    if (reaction?.id) state.likeEvents.set(event.id, reaction.id);
  } catch (err) {
    btn.classList.remove('liked');
    state.liked.delete(event.id);
    persistLiked();
    console.error('Like failed:', err);
    toast('Like failed', 'error');
  }
}

async function publishEvent(kind, content, tags = []) {
  const createdAt = Math.floor(Date.now() / 1000);
  const { event } = await api('/api/v1/idenstr/sign', {
    method: 'POST',
    body: { kind, created_at: createdAt, content, tags }
  });
  const results = await publishSignedEvent(event);
  return { event, results };
}

function publishSignedEvent(event) {
  const writeRelays = new Set(state.relays.write ?? []);
  if (state.config?.privateRelayUrl) writeRelays.delete(state.config.privateRelayUrl);
  const targets = [...writeRelays]
    .map(url => state.sockets.get(url))
    .filter(ws => ws?.readyState === WebSocket.OPEN);
  if (!targets.length) throw new Error('No configured write relays are connected. Idenstr signed and vaulted the event, but Feedstr could not broadcast it.');
  return Promise.all(targets.map(ws => publishToRelay(ws, event)));
}

function publishToRelay(ws, event) {
  const relay = [...state.sockets.entries()].find(([, socket]) => socket === ws)?.[0] ?? 'relay';
  return new Promise((resolve) => {
    const timeout = setTimeout(() => {
      cleanup();
      resolve({ relay, accepted: false, message: 'timeout' });
    }, 5000);
    const handler = (msg) => {
      try {
        const data = JSON.parse(msg.data);
        if (data[0] !== 'OK' || data[1] !== event.id) return;
        cleanup();
        resolve({ relay, accepted: Boolean(data[2]), message: data[3] ?? '' });
      } catch {}
    };
    function cleanup() {
      clearTimeout(timeout);
      ws.removeEventListener('message', handler);
    }
    ws.addEventListener('message', handler);
    ws.send(JSON.stringify(['EVENT', event]));
  });
}

// Relative timestamps go stale ("5m" forever); re-stamp every minute. Piggyback
// the periodic memory prune on the same tick.
setInterval(() => {
  document.querySelectorAll('.note-time[data-ts]').forEach(el => {
    el.textContent = relativeTime(Number(el.dataset.ts));
  });
  pruneMemory();
}, 60000);

composeText.addEventListener('input', () => {

});

composeText.addEventListener('keydown', handleComposeMentionKeydown);
composeText.addEventListener('blur', () => setTimeout(hideComposeMentionSuggestions, 120));
composeMediaBtn.addEventListener('click', () => {
  if (composeMediaUploadInFlight) return;
  composeMediaInput.click();
});
composeMediaInput.addEventListener('change', handleComposeMediaChange);

async function handleComposeMediaChange() {
  if (composeMediaUploadInFlight) return;
  const file = composeMediaInput.files?.[0];
  composeMediaInput.value = '';
  if (!file) return;
  if (!file.type.startsWith('image/')) {
    setComposeMediaStatus('Images only', true);
    return;
  }
  if (file.size > 20 * 1024 * 1024) {
    setComposeMediaStatus('Too large', true);
    setTimeout(() => setComposeMediaStatus('Photo', false), 2600);
    return;
  }
  composeMediaUploadInFlight = true;
  composeMediaBtn.disabled = true;
  composeMediaInput.disabled = true;
  setComposeMediaStatus('Uploading...', false);
  showComposeMediaMessage('Uploading image to nostr.build...', false);
  try {
    const url = await uploadComposeMedia(file);
    appendComposeMediaUrl(url);
    composeText.dispatchEvent(new Event('input'));
    setComposeMediaStatus('Added', false);
    showComposeMediaMessage(`Uploaded: ${url}`, false, url);
    setTimeout(() => setComposeMediaStatus('Photo', false), 1500);
  } catch (err) {
    console.error('Media upload failed:', err);
    setComposeMediaStatus('Failed', true);
    showComposeMediaMessage(err.message || 'Upload failed', true);
    setTimeout(() => setComposeMediaStatus('Photo', false), 2200);
  } finally {
    composeMediaUploadInFlight = false;
    composeMediaBtn.disabled = false;
    composeMediaInput.disabled = false;
  }
}

async function uploadComposeMedia(file) {
  const form = new FormData();
  form.append('file', file, file.name || 'feedstr-image.jpg');
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 90000);
  let res;
  try {
    res = await fetch('/api/v1/media/upload', { method: 'POST', body: form, signal: controller.signal });
  } catch (err) {
    if (err.name === 'AbortError') throw new Error('Upload timed out. Try a smaller image or a different file.');
    throw err;
  } finally {
    clearTimeout(timeout);
  }
  let body = null;
  try { body = await res.json(); } catch {}
  if (!res.ok) throw new Error(body?.message || body?.error || `${res.status} ${res.statusText}`);
  const url = body?.url || body?.urls?.[0];
  if (!url) throw new Error('Upload finished without a media URL');
  return url;
}

function appendComposeMediaUrl(url) {
  appendMediaUrlToTextarea(composeText, url);
}

function setComposeMediaStatus(label, failed) {
  composeMediaBtn.classList.toggle('error', Boolean(failed));
  composeMediaBtn.querySelector('.compose-media-text').textContent = label;
}

function appendMediaUrlToTextarea(textarea, url) {
  const before = textarea.value;
  try {
    insertAtCursor(textarea, url);
  } catch (err) {
    const spacer = before.trim() ? '\n' : '';
    textarea.value = `${before}${spacer}${url}`;
  }
  textarea.dispatchEvent(new Event('input', { bubbles: true }));
  textarea.focus();
}

function setInlineMediaStatus(button, statusEl, label, failed, message = '', url = '') {
  button.classList.toggle('error', Boolean(failed));
  button.querySelector('.compose-media-text').textContent = label;
  if (!statusEl) return;
  statusEl.classList.toggle('hidden', !message);
  statusEl.classList.toggle('error', Boolean(failed));
  statusEl.innerHTML = url
    ? `<span>${esc(message.replace(url, '').trim())}</span> <a href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(url)}</a>`
    : esc(message);
}

function showComposeMediaMessage(message, failed, url = '') {
  if (!composeMediaStatus) return;
  composeMediaStatus.classList.toggle('hidden', !message);
  composeMediaStatus.classList.toggle('error', Boolean(failed));
  composeMediaStatus.innerHTML = url
    ? `<span>${esc(message.replace(url, '').trim())}</span> <a href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(url)}</a>`
    : esc(message);
}

function renderComposeMentionPicker() {
  // Kept as the boot-time hook: suggestions are rendered on demand from state.following.
  hideComposeMentionSuggestions();
}

function buildComposeMentionIndex() {
  state.composeMentionIndex = state.following
    .filter(f => f.pubkey)
    .map(f => {
      const label = mentionDisplayName(f.pubkey, f);
      const search = `${label} ${f.petname ?? ''} ${f.name ?? ''} ${f.pubkey}`.toLowerCase();
      return { pubkey: f.pubkey, label, petname: f.petname ?? '', picture: f.picture ?? '', search };
    })
    .sort((a, b) => a.label.localeCompare(b.label));
}

function getComposeMentionTrigger() {
  const cursor = composeText.selectionStart ?? composeText.value.length;
  const before = composeText.value.slice(0, cursor);
  const match = before.match(/(^|\s)@([\p{L}\p{N}_.-]*)$/u);
  if (!match) return null;
  const atIndex = cursor - match[2].length - 1;
  return { start: atIndex, end: cursor, query: match[2] };
}

function updateComposeMentionSuggestions() {
  const trigger = getComposeMentionTrigger();
  if (!trigger) return hideComposeMentionSuggestions();
  const query = trigger.query.toLowerCase();
  const follows = state.composeMentionIndex
    .filter(f => !query || f.search.includes(query))
    .slice(0, 8);
  composeMentionState.open = true;
  composeMentionState.query = trigger.query;
  composeMentionState.start = trigger.start;
  composeMentionState.end = trigger.end;
  composeMentionState.selected = Math.min(composeMentionState.selected, Math.max(0, follows.length - 1));
  composeMentionState.matches = follows;
  renderComposeMentionSuggestions();
}

function renderComposeMentionSuggestions() {
  if (!composeMentionSuggest) return;
  if (!composeMentionState.open) return hideComposeMentionSuggestions();
  const matches = composeMentionState.matches;
  composeMentionSuggest.classList.remove('hidden');
  composeMentionSuggest.innerHTML = matches.length
    ? matches.map((follow, index) => renderComposeMentionOption(follow, index)).join('')
    : '<div class="mention-suggest-empty">No matching follows</div>';
  composeMentionSuggest.querySelectorAll('.mention-suggest-option').forEach((button, index) => {
    button.addEventListener('mousedown', (event) => event.preventDefault());
    button.addEventListener('click', () => selectComposeMention(index));
  });
}

function renderComposeMentionOption(follow, index) {
  const profile = state.profiles.get(follow.pubkey) ?? follow;
  const active = index === composeMentionState.selected;
  const label = follow.label;
  const secondary = follow.petname && follow.petname !== label ? follow.petname : shortNpub(follow.pubkey);
  return `
    <button class="mention-suggest-option${active ? ' active' : ''}" type="button" role="option" aria-selected="${active}" data-index="${index}">
      ${renderAvatar(profile, follow.pubkey, 'mention-suggest-avatar')}
      <span><strong>${esc(label)}</strong><small>${esc(secondary)}</small></span>
    </button>
  `;
}

function handleComposeMentionKeydown(event) {
  if (!composeMentionState.open) return;
  if (event.key === 'Escape') {
    event.preventDefault();
    hideComposeMentionSuggestions();
    return;
  }
  if (event.key === 'ArrowDown' || event.key === 'ArrowUp') {
    event.preventDefault();
    const count = composeMentionState.matches.length;
    if (!count) return;
    const delta = event.key === 'ArrowDown' ? 1 : -1;
    composeMentionState.selected = (composeMentionState.selected + delta + count) % count;
    renderComposeMentionSuggestions();
    return;
  }
  if ((event.key === 'Enter' || event.key === 'Tab') && composeMentionState.matches.length) {
    event.preventDefault();
    selectComposeMention(composeMentionState.selected);
  }
}

function selectComposeMention(index = 0) {
  const follow = composeMentionState.matches[index];
  if (!follow) return;
  // Insert a readable @Name (not a raw nostr:nprofile blob) and remember the
  // pubkey behind it. The token is resolved to a nostr:nprofile ref + p-tag only
  // at publish time, so the writer always sees a clean name.
  const label = mentionDisplayName(follow.pubkey, follow);
  const token = mentionToken(label);
  replaceComposeRange(composeMentionState.start, composeMentionState.end, `${token} `);
  if (!state.composeMentions.some(m => m.pubkey === follow.pubkey)) {
    const profile = state.profiles.get(follow.pubkey) ?? follow;
    state.composeMentions.push({ token, pubkey: follow.pubkey, label, profile });
  }
  renderComposeTags();
  hideComposeMentionSuggestions();
  composeText.focus();
  composeText.dispatchEvent(new Event('input'));
}

// A mention reads as "@Display Name" in the box; we track the pubkey separately
// so spaces in names are fine.
function mentionToken(label) {
  return `@${label}`;
}

// Keep the tag chips in sync with what is actually written: drop any tracked
// mention whose @token the user has edited or deleted out of the text.
function syncComposeMentions() {
  const text = composeText.value;
  state.composeMentions = state.composeMentions.filter(m => text.includes(m.token));
  renderComposeTags();
}

function renderComposeTags() {
  const wrap = document.getElementById('compose-tags');
  if (!wrap) return;
  const mentions = state.composeMentions;
  if (!mentions.length) {
    wrap.classList.add('hidden');
    wrap.innerHTML = '';
    return;
  }
  wrap.classList.remove('hidden');
  wrap.innerHTML = `<span class="compose-tags-label">Tagging</span>` + mentions.map((m, i) => `
    <span class="compose-tag" data-index="${i}">
      ${renderAvatar(state.profiles.get(m.pubkey) ?? m.profile, m.pubkey, 'compose-tag-avatar')}
      <span class="compose-tag-name">${esc(m.label)}</span>
      <button class="compose-tag-remove" type="button" data-index="${i}" title="Remove" aria-label="Remove ${esc(m.label)}">${iconSvg('x')}</button>
    </span>`).join('');
  wrap.querySelectorAll('.compose-tag-remove').forEach(btn => {
    btn.addEventListener('click', () => removeComposeMention(Number(btn.dataset.index)));
  });
}

function removeComposeMention(index) {
  const mention = state.composeMentions[index];
  if (!mention) return;
  state.composeMentions.splice(index, 1);
  // Strip the @token (and a trailing space) from the text so the box matches.
  composeText.value = composeText.value.replace(`${mention.token} `, '').replace(mention.token, '');
  composeSend.disabled = !composeText.value.trim();
  renderComposeTags();
  composeText.focus();
}

function hideComposeMentionSuggestions() {
  composeMentionState.open = false;
  composeMentionState.matches = [];
  composeMentionState.selected = 0;
  composeMentionSuggest?.classList.add('hidden');
}

function mentionDisplayName(pubkey, fallback = {}) {
  const profile = state.profiles.get(pubkey) ?? fallback;
  return profile.display_name || profile.displayName || profile.name || profile.petname || shortNpub(pubkey);
}

function replaceComposeRange(start, end, text) {
  const prefix = composeText.value.slice(0, start);
  const suffix = composeText.value.slice(end);
  composeText.value = `${prefix}${text}${suffix}`;
  const cursor = prefix.length + text.length;
  composeText.setSelectionRange(cursor, cursor);
}

function insertAtCursor(input, text) {
  const start = input.selectionStart ?? input.value.length;
  const end = input.selectionEnd ?? input.value.length;
  const prefix = input.value.slice(0, start);
  const suffix = input.value.slice(end);
  const spacer = prefix && !/\s$/.test(prefix) ? ' ' : '';
  input.value = `${prefix}${spacer}${text}${suffix}`;
  const cursor = prefix.length + spacer.length + text.length;
  input.setSelectionRange(cursor, cursor);
}

function mentionTagsFromContent(text) {
  const tags = [];
  const seenP = new Set();
  const seenQ = new Set();
  for (const ref of extractNostrRefs(text, { queue: false })) {
    const relay = ref.relays?.[0] || '';
    if (ref.kind === 'profile' && ref.pubkey && !seenP.has(ref.pubkey)) {
      seenP.add(ref.pubkey);
      tags.push(relay ? ['p', ref.pubkey, relay] : ['p', ref.pubkey]);
    } else if (ref.kind === 'event' && ref.eventId && !seenQ.has(ref.eventId)) {
      seenQ.add(ref.eventId); // NIP-18 quote reference
      tags.push(relay ? ['q', ref.eventId, relay] : ['q', ref.eventId]);
    }
  }
  return tags;
}

composeSend.addEventListener('click', async () => {
  const raw = composeText.value.trim();
  if (!raw) return;
  // Resolve readable @Name tokens to nostr:nprofile refs so other clients render
  // the mention; mentionTagsFromContent then derives the p-tags from those refs.
  const text = resolveComposeMentions(raw);
  composeSend.disabled = true;
  composeSend.textContent = 'Posting...';
  try {
    await publishEvent(1, text, mentionTagsFromContent(text));
    composeText.value = '';
    state.composeMentions = [];
    renderComposeTags();
    composeSend.textContent = 'Posted!';
    setTimeout(() => { composeSend.textContent = 'Post'; closeCompose(); }, 700);
  } catch (err) {
    composeSend.textContent = 'Failed';
    setTimeout(() => { composeSend.textContent = 'Post'; composeSend.disabled = false; }, 2000);
  }
});

function resolveComposeMentions(text) {
  let out = text;
  // Longest tokens first so "@Al" can't clobber the inside of "@Alice".
  const mentions = [...state.composeMentions].sort((a, b) => b.token.length - a.token.length);
  for (const m of mentions) out = out.split(m.token).join(`nostr:${encodeNprofile(m.pubkey)}`);
  return out;
}

document.getElementById('columns').addEventListener('click', (e) => {
  const hashtag = e.target.closest('a.hashtag');
  if (hashtag) { e.preventDefault(); openHashtagColumn(hashtag.dataset.tag); return; }
  const nostrLink = e.target.closest('a[href^="nostr:"], a[href^="web+nostr:"]');
  if (nostrLink) {
    e.preventDefault();
    const ref = parseNostrRef(nostrLink.getAttribute('href'));
    if (ref?.kind === 'profile') openProfileColumn(ref.pubkey);
    else if (ref?.kind === 'event') openConversation(ref.eventId, ref.eventId, nostrLink.closest('.column')?.dataset.col);
    else toast('Could not open that reference', 'error');
  }
});

mobileMenuToggle.onclick = () => toggleMobileMenu();
mobileMenuBackdrop.onclick = () => closeMobileMenu();
modal.onclick = (e) => { if (e.target === modal) closeModal(); };

// Basic focus trap: keep Tab cycling inside the add-column / settings modal.
modal.addEventListener('keydown', (e) => {
  if (e.key !== 'Tab' || !modal.classList.contains('open')) return;
  const focusables = modal.querySelectorAll('a[href], button:not([disabled]), input:not([disabled]), textarea:not([disabled]), select:not([disabled]), [tabindex]:not([tabindex="-1"])');
  if (!focusables.length) return;
  const first = focusables[0];
  const last = focusables[focusables.length - 1];
  if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
  else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
});

function toggleMobileMenu() {
  const open = !document.body.classList.contains('mobile-menu-open');
  document.body.classList.toggle('mobile-menu-open', open);
  mobileMenuToggle.setAttribute('aria-expanded', String(open));
  mobileMenuToggle.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
}

function closeMobileMenu() {
  document.body.classList.remove('mobile-menu-open');
  mobileMenuToggle.setAttribute('aria-expanded', 'false');

function showCustomFeedForm(existing = null) {
  const mc = document.getElementById('modal-content');
  const selectedPubkeys = new Set(existing?.pubkeys ?? []);

  mc.innerHTML = `
    <h2>${existing ? 'Edit' : 'Custom'} feed</h2>
    <div class="field">
      <label>Name</label>
      <input type="text" id="custom-name" placeholder="Privacy Tools" value="${esc(existing?.name ?? '')}" />
    </div>
    <div class="field">
      <label>Select follows (${state.following.length})</label>
      <input type="text" class="follow-picker-search" id="follow-search" placeholder="Search..." />
      <div class="follow-picker" id="follow-picker"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-ghost" id="custom-back">Back</button>
      <button class="btn btn-primary" id="custom-add">${existing ? 'Save' : 'Add'}</button>
    </div>
  `;

  function renderPicker(filter = '') {
    const picker = document.getElementById('follow-picker');
    const lf = filter.toLowerCase();
    const filtered = state.following.filter(f =>
      !lf || f.name.toLowerCase().includes(lf) || f.petname.toLowerCase().includes(lf) || f.pubkey.includes(lf)
    );
    picker.innerHTML = '';
    for (const f of filtered) {
      const item = document.createElement('label');
      item.className = `follow-picker-item${selectedPubkeys.has(f.pubkey) ? ' selected' : ''}`;
      item.innerHTML = `
        <input type="checkbox" ${selectedPubkeys.has(f.pubkey) ? 'checked' : ''} />
        <span>${esc(f.name || f.petname || shortNpub(f.pubkey))}</span>
      `;
      item.querySelector('input').onchange = (e) => {
        if (e.target.checked) selectedPubkeys.add(f.pubkey);
        else selectedPubkeys.delete(f.pubkey);
        item.classList.toggle('selected', e.target.checked);
      };
      picker.appendChild(item);
    }
  }

  renderPicker();
  document.getElementById('follow-search').oninput = (e) => renderPicker(e.target.value);
  document.getElementById('custom-back').onclick = () => existing ? closeModal() : showAddColumnModal();
  document.getElementById('custom-add').onclick = () => {
    const name = document.getElementById('custom-name').value.trim() || 'Custom';
    const pubkeys = [...selectedPubkeys];
    if (!pubkeys.length) return;
    if (existing) {
      existing.name = name;
      existing.pubkeys = pubkeys;
      renderColumns();
    } else {
      addColumn({ type: 'custom', name, pubkeys });
    }
    closeModal();
  };
}

function editCustomColumn(col) {
  showCustomFeedForm(col);
  modal.classList.add('open');
}

// Smoothly bring a column into view. On mobile each column is 100vw, so a column
// added at the end of the deck would otherwise sit off-screen to the right and the
// viewport would stay pinned to the first column. rAF lets the new DOM lay out first.
function scrollColumnIntoView(id) {
  requestAnimationFrame(() => {
    document.querySelector(`.column[data-col="${id}"]`)
      ?.scrollIntoView({ behavior: 'smooth', inline: 'start', block: 'nearest' });
  });
}

function addColumn(config) {
  const id = genId();
  const col = { id, events: [], ...config };
  state.columns.push(col);
  buildColumnDom(col, document.getElementById('columns'), document.getElementById('column-list'));
  saveColumns();
  scrollColumnIntoView(id);
  return id;
}

// Open a column, or focus the matching existing one instead of stacking a duplicate.
function openOrFocusColumn(config, matchFn) {
  const existing = matchFn ? state.columns.find(matchFn) : null;
  if (existing) {
    scrollColumnIntoView(existing.id);
    return existing;
  }
  addColumn(config);
  return state.columns[state.columns.length - 1];
}

// Fast lookup set for the avatar follow-ring, rebuilt whenever the follow list changes.
function refreshFollowingSet() {
  state.followingSet = new Set((state.following ?? []).map(f => f.pubkey).filter(Boolean));
}

function isFollowing(pubkey) {
  return Boolean(pubkey) && (state.followingSet?.has(pubkey) ?? false);
}

// Mutate the local follow list + ring instantly (optimistic); the server call follows.
function setFollowLocal(pubkey, name, following) {
  if (following) {
    if (!state.following.some(f => f.pubkey === pubkey)) {
      state.following.push({ pubkey, npub: '', petname: name || '', name: name || '', picture: '' });
    }
  } else {
    state.following = state.following.filter(f => f.pubkey !== pubkey);
  }
  refreshFollowingSet();
  document.querySelectorAll(`.note-avatar[data-pubkey="${CSS.escape(pubkey)}"]`)
    .forEach(el => el.classList.toggle('following', following));
}

function toggleFollow(col) {
  if (!col?.pubkey) return;
  return isFollowing(col.pubkey) ? unfollowUser(col.pubkey, col.name, col) : followUser(col.pubkey, col.name, col);
}

async function followUser(pubkey, name, col) {
  const label = name || shortNpub(pubkey);
  setFollowLocal(pubkey, name, true);
  if (col) updateColumnHeader(col);
  try {
    await api('/api/v1/idenstr/following/follow', { method: 'POST', body: { pubkey, petname: name || '' } });
    toast(`Following ${label}`, 'success');
  } catch (err) {
    setFollowLocal(pubkey, name, false);
    if (col) updateColumnHeader(col);
    toast(followError(err), 'error');
  }
}

async function unfollowUser(pubkey, name, col) {
  const label = name || shortNpub(pubkey);
  setFollowLocal(pubkey, name, false);
  if (col) updateColumnHeader(col);
  try {
    await api('/api/v1/idenstr/following/unfollow', { method: 'POST', body: { pubkey } });
    toast(`Unfollowed ${label}`, 'info', { label: 'Undo', onAction: () => followUser(pubkey, name, col) });
  } catch (err) {
    setFollowLocal(pubkey, name, true);
    if (col) updateColumnHeader(col);
    toast(followError(err), 'error');
  }
}

function followError(err) {
  const m = String(err?.message || err || '');
  if (/403|forbidden|scope|following:write/i.test(m)) {
    return "Grant Feedstr the 'following:write' scope in Idenstr to follow";
  }
  return 'Follow update failed';
}

function openProfileColumn(pubkey, name) {
  if (!pubkey) { toast('Could not resolve that profile', 'error'); return; }
  openOrFocusColumn(
    { type: 'profile', name: name || shortNpub(pubkey), pubkey },
    c => c.type === 'profile' && c.pubkey === pubkey
  );
}

function openHashtagColumn(rawTag) {
  const tag = String(rawTag || '').replace(/^#/, '').toLowerCase();
  if (!tag) return;
  openOrFocusColumn(
    { type: 'hashtag', name: `#${tag}`, tag },
    c => c.type === 'hashtag' && c.tag?.toLowerCase() === tag
  );
}

function removeColumnCache(id) {
  clearTimeout(cacheTimers.get(id));
  cacheTimers.delete(id);
  api(`/api/v1/cache/${id}`, { method: 'DELETE' }).catch(() => {});
}

function reloadColumn(col) {
  col.events = [];
  col._ids = new Set();
  renderColumnFeed(col);
  startColumnSub(col);
}

function removeColumn(id) {
  unsubscribe(`col_${id}`);
  unsubscribe(`replies_${id}`);
  unsubscribe(`engagement_${id}`);
  unsubscribe(`thread_replies_${id}`);
  state.columns = state.columns.filter(c => c.id !== id);
  removeColumnCache(id);
  document.querySelector(`.column[data-col="${id}"]`)?.remove();
  document.querySelector(`#column-list [data-side-col="${id}"]`)?.remove();
  pruneMemory();
  saveColumns();
}

const DEFAULT_COLUMNS = () => [
  { id: genId(), type: 'home', name: 'Home' },
  { id: genId(), type: 'following', name: 'Following' },
  { id: genId(), type: 'notifications', name: 'Notifications', notificationFilter: 'all' }
];

async function loadColumns() {
  try {
    const { value } = await api('/api/v1/state/columns');
    if (Array.isArray(value) && value.length) return value;
  } catch {}
  // One-time migration of columns saved by older versions in browser storage.
  const legacy = localStorage.getItem('feedstr:columns');
  if (legacy) {
    try {
      const cols = JSON.parse(legacy);
      if (Array.isArray(cols) && cols.length) {
        await persistColumns(cols);
        localStorage.removeItem('feedstr:columns');
        return cols;
      }
    } catch {}
  }
  return DEFAULT_COLUMNS();
}

async function persistColumns(columns) {
  // Persist only column configuration; everything else (events, dedup set, open
  // thread, scroll markers) is runtime state that must not survive a reload.
  const serializable = columns.map((c) => {
    const out = { id: c.id, type: c.type, name: c.name };
    if (c.pubkey) out.pubkey = c.pubkey;
    if (c.pubkeys) out.pubkeys = c.pubkeys;
    if (c.tag) out.tag = c.tag;
    if (c.notificationFilter) out.notificationFilter = c.notificationFilter;
    return out;
  });
  try {
    await api('/api/v1/state/columns', { method: 'PUT', body: { value: serializable } });
  } catch (err) {
    console.warn('Failed to save columns', err.message);
  }
}

// Liked note ids live in Feedstr's DB so the heart stays filled across reloads;
// the like itself is the published kind:7 reaction vaulted in the private relay.
async function loadLiked() {
  try {
    const { value } = await api('/api/v1/state/liked');
    if (Array.isArray(value)) return new Set(value);
  } catch {}
  return new Set();
}

function persistLiked() {
  api('/api/v1/state/liked', { method: 'PUT', body: { value: [...state.liked] } })
    .catch(err => console.warn('Failed to save liked notes', err.message));
}

// One-tap zap amount. A Feedstr UX preference (not a wallet credential), so it
// lives in Feedstr's own state store, server-side, and syncs across devices.
async function loadZapDefault() {
  try {
    const { value } = await api('/api/v1/state/zap-default');
    const n = Math.round(Number(value));
    if (Number.isFinite(n) && n >= 1) return n;
  } catch {}
  return 100;
}

function persistZapDefault() {
  api('/api/v1/state/zap-default', { method: 'PUT', body: { value: state.zapDefaultSats } })
    .catch(err => console.warn('Failed to save default zap amount', err.message));
}

// Mutes come from Idenstr's kind:10000 identity policy when available. The
// Feedstr local state fallback keeps older keyword mutes alive until Idenstr is linked.
async function loadMutes() {
  try {
    const { value } = await api('/api/v1/state/mutes');
    return normalizeMutes(value);
  } catch {}
  return { entries: [] };
}

function normalizeMutes(value) {
  if (Array.isArray(value)) {
    return { entries: value.map((s, i) => ({ id: `legacy-${i}`, type: 'keyword', value: String(s).toLowerCase(), label: '', addedAt: '' })) };
  }
  const entries = Array.isArray(value?.entries) ? value.entries : [];
  return { ...value, entries: entries.map((entry, i) => ({ id: entry.id || `mute-${i}`, type: entry.type || 'keyword', value: String(entry.value ?? entry.keyword ?? '').toLowerCase(), label: entry.label || '', addedAt: entry.addedAt || '' })).filter(e => e.value) };
}

function refreshMuteSets() {
  state.muteSets = {
    keyword: new Set(muteEntriesByType('keyword').map(e => e.value)),
    pubkey: new Set(muteEntriesByType('pubkey').map(e => e.value)),
    thread: new Set([...muteEntriesByType('thread'), ...muteEntriesByType('event')].map(e => e.value)),
    hashtag: new Set(muteEntriesByType('hashtag').map(e => e.value.replace(/^#/, '')))
  };
}

function muteEntriesByType(type) {
  return (state.mutes?.entries ?? []).filter(entry => entry.type === type);
}

// Keyword mutes publish through Idenstr's signed kind:10000 list, exactly like
// profile and thread mutes, so a muted word reaches the relays and other clients
// instead of sitting as an unpublished local draft. Optimistic with rollback.
async function muteKeyword(term) {
  state.mutes.entries.push({ id: `local-${Date.now()}`, type: 'keyword', value: term, label: '', addedAt: new Date().toISOString() });
  refreshMuteSets();
  renderMuteList();
  scheduleRerenderAllColumns();
  try {
    await api('/api/v1/idenstr/mutes/mute', { method: 'POST', body: { type: 'keyword', value: term } });
    toast(`Muted "${term}"`, 'success');
  } catch (err) {
    state.mutes.entries = (state.mutes.entries ?? []).filter(m => !(m.type === 'keyword' && m.value === term));
    refreshMuteSets();
    renderMuteList();
    scheduleRerenderAllColumns();
    toast(muteError(err), 'error');
  }
}

async function unmuteKeyword(term) {
  const removed = (state.mutes.entries ?? []).filter(m => m.type === 'keyword' && m.value === term);
  state.mutes.entries = (state.mutes.entries ?? []).filter(m => !(m.type === 'keyword' && m.value === term));
  refreshMuteSets();
  renderMuteList();
  scheduleRerenderAllColumns();
  try {
    await api('/api/v1/idenstr/mutes/unmute', { method: 'POST', body: { idOrValue: term } });
    toast(`Unmuted "${term}"`, 'success');
  } catch (err) {
    state.mutes.entries.push(...removed);
    refreshMuteSets();
    renderMuteList();
    scheduleRerenderAllColumns();
    toast(muteError(err), 'error');
  }
}

function isMuted(event) {
  if (!event) return false;
  const sets = state.muteSets || {};
  if (sets.pubkey?.has(event.pubkey)) return true;
  if (isMutedThreadEvent(event)) return true;
  if (event.kind === 1) {
    const content = (event.content || '').toLowerCase();
    for (const term of sets.keyword ?? []) if (term && content.includes(term)) return true;
    for (const tag of event.tags ?? []) if (tag[0] === 't' && sets.hashtag?.has(String(tag[1] || '').toLowerCase().replace(/^#/, ''))) return true;
  }
  return false;
}

function isMutedThreadEvent(event) {
  const muted = state.muteSets?.thread;
  if (!muted?.size || !event) return false;
  if (muted.has(event.id)) return true;
  const parent = getReplyParentRef(event)?.eventId;
  if (parent && muted.has(parent)) return true;
  return (event.tags ?? []).some(tag => tag[0] === 'e' && muted.has(tag[1]));
}

function isMutedNotification(notification) {
  if (!notification) return false;
  if (state.muteSets?.pubkey?.has(notification.actorPubkey)) return true;
  if (notification.targetEventId && state.muteSets?.thread?.has(notification.targetEventId)) return true;
  return isMuted(notification.rawEvent);
}

function isMutedProfile(pubkey) {
  return Boolean(pubkey) && Boolean(state.muteSets?.pubkey?.has(pubkey));
}

function setMuteProfileLocal(pubkey, name, muted) {
  if (!pubkey) return;
  if (muted) {
    if (!isMutedProfile(pubkey)) {
      state.mutes.entries.push({ id: `pubkey-${pubkey}`, type: 'pubkey', value: pubkey, label: name || '', addedAt: new Date().toISOString() });
    }
  } else {
    state.mutes.entries = (state.mutes.entries ?? []).filter(e => !(e.type === 'pubkey' && e.value === pubkey));
  }
  refreshMuteSets();
}

function setMuteThreadLocal(threadId, muted) {
  if (!threadId) return;
  if (muted) {
    if (!state.muteSets?.thread?.has(threadId)) {
      state.mutes.entries.push({ id: `thread-${threadId}`, type: 'thread', value: threadId, label: 'Muted thread', addedAt: new Date().toISOString() });
    }
  } else {
    state.mutes.entries = (state.mutes.entries ?? []).filter(e => !((e.type === 'thread' || e.type === 'event') && e.value === threadId));
  }
  refreshMuteSets();
}

function toggleMuteProfile(col) {
  if (!col?.pubkey) return;
  return isMutedProfile(col.pubkey) ? unmuteProfile(col.pubkey, col.name, col) : muteProfile(col.pubkey, col.name, col);
}

async function muteProfile(pubkey, name, col) {
  const label = name || shortNpub(pubkey);
  setMuteProfileLocal(pubkey, name, true);
  if (col) updateColumnHeader(col);
  scheduleRerenderAllColumns();
  try {
    await api('/api/v1/idenstr/mutes/mute', { method: 'POST', body: { type: 'pubkey', value: pubkey, label } });
    toast(`Muted ${label}`, 'success');
  } catch (err) {
    setMuteProfileLocal(pubkey, name, false);
    if (col) updateColumnHeader(col);
    scheduleRerenderAllColumns();
    toast(muteError(err), 'error');
  }
}

async function unmuteProfile(pubkey, name, col) {
  const label = name || shortNpub(pubkey);
  setMuteProfileLocal(pubkey, name, false);
  if (col) updateColumnHeader(col);
  scheduleRerenderAllColumns();
  try {
    await api('/api/v1/idenstr/mutes/unmute', { method: 'POST', body: { idOrValue: pubkey } });
    toast(`Unmuted ${label}`, 'success');
  } catch (err) {
    setMuteProfileLocal(pubkey, name, true);
    if (col) updateColumnHeader(col);
    scheduleRerenderAllColumns();
    toast(muteError(err), 'error');
  }
}

function muteError(err) {
  const m = String(err?.message || err || '');
  if (/403|forbidden|scope|mutes:write/i.test(m)) return "Grant Feedstr the 'mutes:write' scope in Idenstr to mute";
  return 'Mute update failed';
}

async function muteThread(event) {
  const threadId = getReplyParentRef(event)?.eventId || event.id;
  if (!threadId) return;
  if (state.muteSets?.thread?.has(threadId)) return;
  setMuteThreadLocal(threadId, true);
  scheduleRerenderAllColumns();
  try {
    await api('/api/v1/idenstr/mutes/mute', { method: 'POST', body: { type: 'thread', value: threadId, label: 'Muted thread' } });
    toast('Thread muted', 'success');
  } catch (err) {
    setMuteThreadLocal(threadId, false);
    scheduleRerenderAllColumns();
    toast(muteError(err), 'error');
  }
}

// One-shot REQ to the private relay only (it holds everything you signed) for your
// own reactions. handleEvent collects the e-tags; handleEose persists and rerenders.
function backfillLiked() {
  const pubkey = state.identity?.pubkey;
  const url = state.config?.privateRelayUrl;
  if (!pubkey || !url) return;
  const ws = state.sockets.get(url);
  if (ws?.readyState !== WebSocket.OPEN) return;
  const subId = `liked_backfill_${Date.now()}`;
  const filter = { kinds: [7], authors: [pubkey] };
  state.subs.set(subId, { filters: [filter], columnId: null, oneshot: true, likedBackfill: true });
  ws.send(JSON.stringify(['REQ', subId, filter]));
}

// Reply counts: how many notes e-tag a given note. Used to show "N replies" on
// the reply action of your own posts in the Home column.
function replyCountLabel(noteId) {
  const n = state.replyCounts.get(noteId)?.size ?? 0;
  return n ? String(n) : '';
}

function updateReplyBadge(noteId) {
  const label = replyCountLabel(noteId);
  const sel = window.CSS?.escape ? CSS.escape(noteId) : noteId;
  document.querySelectorAll(`.note[data-id="${sel}"] [data-action="reply"] span`)
    .forEach(span => { span.textContent = label; });
}

// A kind:1 reply event came back on a reply-count subscription: credit it to
// every tracked note it references, then refresh those badges.
function registerReplyEvent(event) {
  if (!event || event.kind !== 1) return;
  for (const tag of event.tags ?? []) {
    if (tag[0] !== 'e') continue;
    const noteId = tag[1];
    const set = state.replyCounts.get(noteId);
    if (!set || event.id === noteId) continue; // only count toward tracked notes
    if (!set.has(event.id)) {
      set.add(event.id);
      updateReplyBadge(noteId);
    }
  }
}

// (Re)subscribe for replies to the notes currently shown in a column. Debounced
// because the column re-renders on every incoming note.
const replyCountTimers = new Map();
function scheduleReplyCounts(col) {
  if (!col?.id) return;
  clearTimeout(replyCountTimers.get(col.id));
  replyCountTimers.set(col.id, setTimeout(() => {
    replyCountTimers.delete(col.id);
    fetchReplyCounts(col);
  }, 800));
}

function fetchReplyCounts(col) {
  const ids = (col.events ?? []).filter(e => e.kind === 1).map(e => e.id).slice(0, 200);
  if (!ids.length) return;
  for (const id of ids) if (!state.replyCounts.has(id)) state.replyCounts.set(id, new Set());
  const subId = `replies_${col.id}`;
  unsubscribe(subId);
  const filter = { kinds: [1], '#e': ids };
  state.subs.set(subId, { filters: [filter], columnId: null, replyCount: true, allRelays: true });
  const sockets = [...state.sockets.values()].filter(ws => ws.readyState === WebSocket.OPEN);
  for (const ws of sockets) ws.send(JSON.stringify(['REQ', subId, filter]));
}

// Engagement counts: how many reposts (kind:6) and reactions (kind:7) e-tag a note.
function repostCountLabel(noteId) {
  const n = state.repostCounts.get(noteId)?.size ?? 0;
  return n ? String(n) : '';
}

function reactionCountLabel(noteId) {
  const n = state.reactionCounts.get(noteId)?.size ?? 0;
  return n ? String(n) : '';
}

function updateEngagementBadges(noteId) {
  const sel = window.CSS?.escape ? CSS.escape(noteId) : noteId;
  document.querySelectorAll(`.note[data-id="${sel}"] [data-action="repost"] span`)
    .forEach(span => { span.textContent = repostCountLabel(noteId); });
  document.querySelectorAll(`.note[data-id="${sel}"] [data-action="like"] span`)
    .forEach(span => { span.textContent = reactionCountLabel(noteId); });
}

function registerEngagementEvent(event) {
  if (!event || (event.kind !== 6 && event.kind !== 7)) return;
  const counts = event.kind === 6 ? state.repostCounts : state.reactionCounts;
  for (const tag of event.tags ?? []) {
    if (tag[0] !== 'e') continue;
    const noteId = tag[1];
    const set = counts.get(noteId);
    if (!set) continue; // only count toward tracked notes
    if (!set.has(event.id)) {
      set.add(event.id);
      updateEngagementBadges(noteId);
    }
  }
}

const engagementCountTimers = new Map();
function scheduleEngagementCounts(col) {
  if (!col?.id) return;
  clearTimeout(engagementCountTimers.get(col.id));
  engagementCountTimers.set(col.id, setTimeout(() => {
    engagementCountTimers.delete(col.id);
    fetchEngagementCounts(col);
  }, 800));
}

function fetchEngagementCounts(col) {
  const ids = (col.events ?? []).filter(e => e.kind === 1).map(e => e.id).slice(0, 200);
  if (!ids.length) return;
  for (const id of ids) {
    if (!state.repostCounts.has(id)) state.repostCounts.set(id, new Set());
    if (!state.reactionCounts.has(id)) state.reactionCounts.set(id, new Set());
  }
  const subId = `engagement_${col.id}`;
  unsubscribe(subId);
  const filter = { kinds: [6, 7], '#e': ids };
  state.subs.set(subId, { filters: [filter], columnId: null, engagementCount: true, allRelays: true });
  const sockets = [...state.sockets.values()].filter(ws => ws.readyState === WebSocket.OPEN);
  for (const ws of sockets) ws.send(JSON.stringify(['REQ', subId, filter]));
}

function saveColumns() {
  persistColumns(state.columns);
}

// Cached observed notes are persisted per column (debounced) so feeds are warm
// on the next visit; the live subscription dedupes against them on reconnect.
const cacheTimers = new Map();
function scheduleCacheColumn(col) {
  if (!col?.id) return;
  col._cacheDirty = true;
  // Coalesce: at most one snapshot write per 5s window per column, no matter how
  // fast events stream. Each write rewrites the whole snapshot, so this caps the
  // churn instead of rewriting on every burst.
  if (cacheTimers.has(col.id)) return;
  cacheTimers.set(col.id, setTimeout(() => {
    cacheTimers.delete(col.id);
    flushColumnCache(col);
  }, 5000));
}

function flushColumnCache(col) {
  if (!col?.id || !col._cacheDirty) return;
  col._cacheDirty = false;
  api(`/api/v1/cache/${col.id}`, { method: 'PUT', body: { events: (col.events ?? []).slice(0, 500) } }).catch(() => {});
}

// Persist pending snapshots when the tab is backgrounded or closed, so a fast
// streaming column isn't lost between coalesce windows (covers mobile too).
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState !== 'hidden') return;
  for (const col of state.columns) {
    clearTimeout(cacheTimers.get(col.id));
    cacheTimers.delete(col.id);
    flushColumnCache(col);
  }
});

async function hydrateColumnCache(col) {
  if (!col?.id) return;
  try {
    const { events } = await api(`/api/v1/cache/${col.id}`);
    if (!Array.isArray(events) || !events.length) return;
    if (!col.events) col.events = [];
    const seen = new Set(col.events.map(e => e.id));
    for (const event of events) if (!seen.has(event.id)) { col.events.push(event); seen.add(event.id); }
    col.events.sort((a, b) => (b.created_at ?? 0) - (a.created_at ?? 0));
    if (col.events.length > 500) col.events = col.events.slice(0, 500);
    col._ids = new Set(col.events.map(e => e.id));
    renderColumnFeed(col);
  } catch {}
}

// Bound the long-lived in-memory caches. Notes and engagement counts accumulate
// as events stream in, so a tab left open for hours would grow without limit.
const NOTE_CACHE_LIMIT = 5000;
function pruneMemory() {
  const live = new Set();
  for (const col of state.columns) for (const e of col.events ?? []) live.add(e.id);
  // Reply/reaction/repost counts only matter for notes a column still shows.
  for (const map of [state.replyCounts, state.reactionCounts, state.repostCounts]) {
    for (const id of map.keys()) if (!live.has(id)) map.delete(id);
  }
  // Trim the global note cache oldest-first, protecting notes still on screen.
  if (state.notes.size > NOTE_CACHE_LIMIT) {
    for (const id of state.notes.keys()) {
      if (state.notes.size <= NOTE_CACHE_LIMIT) break;
      if (live.has(id)) continue;
      state.notes.delete(id);
      _profilePubkeyCache.delete(id);
      state.embeddedEventFetchTried.delete(id);
    }
  }
}

// -- helpers --
function genId() { return Math.random().toString(36).slice(2, 10); }

// Lightweight snackbar. type: 'info' (default) | 'success' | 'error'.
let toastTimer = null;
function toast(message, type = 'info', action = null) {
  const host = document.getElementById('toast-host');
  if (!host) return;
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  const text = document.createElement('span');
  text.textContent = message;
  el.appendChild(text);
  host.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  const remove = () => { el.classList.remove('show'); setTimeout(() => el.remove(), 200); };
  if (action) {
    const btn = document.createElement('button');
    btn.className = 'toast-action';
    btn.textContent = action.label;
    btn.onclick = (e) => { e.stopPropagation(); remove(); action.onAction(); };
    el.appendChild(btn);
  }
  clearTimeout(toastTimer);
  toastTimer = setTimeout(remove, action ? 6000 : 3200);
  el.onclick = remove;
}

// npub / nprofile / 64-char hex -> hex pubkey, or null if unrecognisable.
function toHexPubkey(input) {
  const value = String(input ?? '').trim();
  if (/^[0-9a-f]{64}$/i.test(value)) return value.toLowerCase();
  const ref = parseNostrRef(value);
  return ref?.kind === 'profile' ? ref.pubkey : null;
}

function shortNpub(key) {
  if (!key) return '?';
  if (key.startsWith('npub')) return key.slice(0, 8) + '...' + key.slice(-4);
  return key.slice(0, 8) + '...';
}

function relativeTime(ts) {
  if (!ts) return '';
  const diff = Math.floor(Date.now() / 1000) - ts;
  if (diff < 60) return 'now';
  if (diff < 3600) return `${Math.floor(diff / 60)}m`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}h`;
  return `${Math.floor(diff / 86400)}d`;
}

function getEventActorPubkey(event) {
  if (event?.kind === 9735) return getZapSenderPubkey(event);
  return event?.pubkey;
}

function getZapSenderPubkey(event) {
  const pTag = firstTagValue(event, 'P');
  if (pTag) return pTag;
  const description = firstTagValue(event, 'description');
  if (description) {
    try {
      const request = JSON.parse(description);
      if (request?.pubkey) return request.pubkey;
    } catch {}
  }
  return event?.pubkey;
}

function firstTagValue(event, name) {
  return (event?.tags ?? []).find(tag => tag[0] === name)?.[1] || '';
}

function parseZapComment(event) {
  const description = firstTagValue(event, 'description');
  if (!description) return '';
  try {
    const request = JSON.parse(description);
    return request?.content || '';
  } catch {
    return '';
  }
}

function parseZapAmountSats(event) {
  const millisats = Number(firstTagValue(event, 'amount'));
  if (Number.isFinite(millisats) && millisats > 0) return Math.round(millisats / 1000);

  const bolt11 = firstTagValue(event, 'bolt11').toLowerCase();
  const match = bolt11.match(/^lnbc(\d+)([munp]?)/);
  if (!match) return null;
  const value = Number(match[1]);
  const multiplier = { '': 100000000, m: 100000, u: 100, n: 0.1, p: 0.0001 }[match[2]];
  const sats = value * multiplier;
  return Number.isFinite(sats) && sats > 0 ? Math.round(sats) : null;
}

function formatContent(text, event = null) {
  const raw = expandIndexedNostrReferences(String(text ?? ''), event);
  const urls = extractUrls(raw);
  const nostrRefs = extractNostrRefs(raw);
  const eventRefs = nostrRefs.filter(ref => ref.kind === 'event');
  const imageUrls = urls.filter(isImageUrl);
  const visibleText = removePreviewedTokens(raw, [...imageUrls, ...eventRefs.map(ref => ref.raw)]);
  return `${linkifyText(visibleText)}${renderLinkPreviews(urls)}${renderNostrEventPreviews(eventRefs)}`;
}

function expandIndexedNostrReferences(text, event) {
  if (!event?.tags?.length) return text;
  return String(text ?? '').replace(/#\[(\d+)\]/g, (match, indexText) => {
    const tag = event.tags[Number(indexText)];
    if (!tag) return match;
    if (tag[0] === 'p' && isHex(tag[1], 64)) {
      seedProfileHintFromTag(tag);
      return `nostr:${encodeNprofile(tag[1], tag[2] ? [tag[2]] : [])}`;
    }
    if (tag[0] === 'e' && isHex(tag[1], 64)) return `nostr:${encodeNote(tag[1])}`;
    if (tag[0] === 't' && tag[1]) return `#${tag[1]}`;
    return match;
  });
}

function seedProfileHintFromTag(tag) {
  const pubkey = tag?.[1];
  const petname = tag?.[3];
  if (!isHex(pubkey, 64) || !petname) return;
  const existing = state.profiles.get(pubkey);
  if (existing?.name || existing?.display_name || existing?.displayName) return;
  state.profiles.set(pubkey, { ...(existing ?? {}), name: petname, display_name: petname, created_at: existing?.created_at ?? 0 });
}

function linkifyText(text) {
  return esc(text)
    .replace(/(https?:\/\/[^\s<]+)/g, (match) => {
      const clean = normalizeUrlForDisplay(match);
      const trailing = match.slice(clean.length);
      return `<a href="${esc(clean)}" target="_blank" rel="noopener noreferrer">${esc(clean)}</a>${esc(trailing)}`;
    })
    .replace(/((?:web\+)?nostr:[^\s<]+|(?:n(?:profile|pub|event|ote)|event)1[023456789acdefghjklmnpqrstuvwxyz]+)/gi, (match) => {
      const clean = normalizeUrlForDisplay(match);
      const ref = parseNostrRef(clean);
      const trailing = match.slice(clean.length);
      if (ref?.kind === 'profile') return `${renderNostrProfileMention(ref)}${esc(trailing)}`;
      const href = clean.startsWith('nostr:') || clean.startsWith('web+nostr:') ? clean : `nostr:${clean}`;
      return `<a href="${esc(href)}" class="nostr-ref-link">${esc(clean)}</a>${esc(trailing)}`;
    })
    .replace(/(^|\s)#([\p{L}\p{N}_-]+)/gu, '$1<a href="#" class="hashtag" data-tag="$2">#$2</a>')
    .replace(/\n/g, '<br>');
}

function removePreviewedTokens(text, tokens) {
  if (!tokens.length) return text;
  const tokenSet = new Set(tokens);
  const withoutTokens = String(text ?? '').replace(/(?:https?:\/\/[^\s<>"]+|(?:web\+)?nostr:[^\s<>"]+|(?:n(?:profile|pub|event|ote)|event)1[023456789acdefghjklmnpqrstuvwxyz]+)/gi, (match) => {
    const clean = normalizeUrlForDisplay(match);
    const trailing = match.slice(clean.length);
    return tokenSet.has(clean) ? trailing : match;
  });
  return withoutTokens
    .split('\n')
    .map(line => line.replace(/[ \t]{2,}/g, ' ').trimEnd())
    .filter(line => line.trim() || withoutTokens.trim().includes('\n'))
    .join('\n')
    .trim();
}

function extractUrls(text) {
  const matches = String(text ?? '').match(/https?:\/\/[^\s<>"]+/g) ?? [];
  return [...new Set(matches.map(normalizeUrlForDisplay).filter(Boolean))];
}

function normalizeUrlForDisplay(url) {
  return String(url ?? '').replace(/[),.!?;:]+$/g, '');
}

function renderLinkPreviews(urls) {
  if (!urls.length) return '';
  const images = urls.filter(isImageUrl);
  const links = urls.filter(url => !isImageUrl(url));
  const imageHtml = images.length
    ? `<div class="note-media-grid">${images.map(renderImagePreview).join('')}</div>`
    : '';
  const linkHtml = links.length
    ? `<div class="note-link-list">${links.slice(0, 3).map(renderLinkCard).join('')}</div>`
    : '';
  return `${imageHtml}${linkHtml}`;
}

function isImageUrl(url) {
  try {
    const parsed = new URL(url);
    return /\.(avif|gif|jpe?g|png|webp)$/i.test(parsed.pathname);
  } catch {
    return /\.(avif|gif|jpe?g|png|webp)(\?|#|$)/i.test(url);
  }
}

function renderImagePreview(url) {
  return `<a class="note-media" href="${esc(url)}" target="_blank" rel="noopener noreferrer"><img src="${esc(url)}" loading="lazy" alt="Attached image" onerror="this.closest('.note-media')?.remove()" /></a>`;
}

function renderLinkCard(url) {
  const host = linkHost(url);
  return `<a class="note-link-card" href="${esc(url)}" target="_blank" rel="noopener noreferrer"><span class="note-link-host">${esc(host)}</span><span class="note-link-url">${esc(url)}</span></a>`;
}

function linkHost(url) {
  try {
    return new URL(url).hostname.replace(/^www\./, '');
  } catch {
    return url;
  }
}

function extractNostrRefs(text, options = {}) {
  const shouldQueue = options.queue !== false;
  const matches = String(text ?? '').match(/(?:web\+)?nostr:[^\s<>"]+|(?:n(?:profile|pub|event|ote)|event)1[023456789acdefghjklmnpqrstuvwxyz]+/gi) ?? [];
  const refs = [];
  const seen = new Set();
  for (const match of matches) {
    const raw = normalizeUrlForDisplay(match);
    const ref = parseNostrRef(raw);
    if (!ref) continue;
    const key = `${ref.kind}:${ref.eventId || ref.pubkey}`;
    if (seen.has(key)) continue;
    seen.add(key);
    refs.push({ ...ref, raw });
    if (shouldQueue && ref.kind === 'event') fetchEmbeddedEvent(ref.eventId, ref.relays);
    if (shouldQueue && ref.kind === 'profile' && profileNeedsRefresh(ref.pubkey)) queueProfileFetch(ref.pubkey);
  }
  return refs;
}

function extractNostrEventRefs(text) {
  return extractNostrRefs(text).filter(ref => ref.kind === 'event');
}

function parseNostrRef(value) {
  const entity = String(value ?? '').replace(/^web\+nostr:/i, '').replace(/^nostr:/i, '');
  const decoded = decodeNip19(entity);
  if (!decoded) return null;
  if ((decoded.prefix === 'note' || decoded.prefix === 'event') && decoded.bytes.length >= 32) {
    return { kind: 'event', type: decoded.prefix, eventId: bytesToHex(decoded.bytes.slice(0, 32)), relays: [] };
  }
  if (decoded.prefix === 'nevent') {
    const ref = parseNevent(decoded.bytes);
    return ref ? { kind: 'event', ...ref } : null;
  }
  if (decoded.prefix === 'npub' && decoded.bytes.length >= 32) {
    return { kind: 'profile', type: 'npub', pubkey: bytesToHex(decoded.bytes.slice(0, 32)), relays: [] };
  }
  if (decoded.prefix === 'nprofile') {
    const ref = parseNprofile(decoded.bytes);
    return ref ? { kind: 'profile', ...ref } : null;
  }
  return null;
}

function parseNostrEventRef(value) {
  const ref = parseNostrRef(value);
  return ref?.kind === 'event' ? ref : null;
}

function parseNevent(bytes) {
  let i = 0;
  let eventId = '';
  const relays = [];
  while (i + 2 <= bytes.length) {
    const type = bytes[i++];
    const len = bytes[i++];
    const value = bytes.slice(i, i + len);
    i += len;
    if (type === 0 && len === 32) eventId = bytesToHex(value);
    if (type === 1) relays.push(new TextDecoder().decode(new Uint8Array(value)));
  }
  return eventId ? { type: 'nevent', eventId, relays } : null;
}

function parseNprofile(bytes) {
  let i = 0;
  let pubkey = '';
  const relays = [];
  while (i + 2 <= bytes.length) {
    const type = bytes[i++];
    const len = bytes[i++];
    const value = bytes.slice(i, i + len);
    i += len;
    if (type === 0 && len === 32) pubkey = bytesToHex(value);
    if (type === 1) relays.push(new TextDecoder().decode(new Uint8Array(value)));
  }
  return pubkey ? { type: 'nprofile', pubkey, relays } : null;
}

function renderNostrEventPreviews(refs) {
  if (!refs.length) return '';
  return `<div class="nostr-embed-list">${refs.map(renderNostrEventCard).join('')}</div>`;
}

function renderNostrEventCard(ref) {
  const event = state.notes.get(ref.eventId);
  if (!event) {
    return `<div class="nostr-embed loading" data-event-id="${esc(ref.eventId)}"><span>Nostr event</span><strong>${esc(shortNpub(ref.eventId))}</strong><small>Loading from relays...</small></div>`;
  }
  const profile = state.profiles.get(event.pubkey) ?? {};
  if (profileNeedsRefresh(event.pubkey)) queueProfileFetch(event.pubkey);
  const name = profile.display_name || profile.displayName || profile.name || shortNpub(event.pubkey);
  const preview = stripMarkup(formatContent(event.content ?? '', event)).slice(0, 180) || 'Nostr event';
  return `<a class="nostr-embed" data-event-id="${esc(ref.eventId)}" href="nostr:${esc(encodeNote(ref.eventId))}" title="Open Nostr event"><span>Nostr event</span><strong>${esc(name)}</strong><small>${esc(preview)}</small></a>`;
}

function renderNostrProfileMention(ref) {
  const profile = state.profiles.get(ref.pubkey) ?? {};
  if (profileNeedsRefresh(ref.pubkey)) queueProfileFetch(ref.pubkey);
  const name = profile.display_name || profile.displayName || profile.name || shortNpub(ref.pubkey);
  const href = `nostr:${encodeNprofile(ref.pubkey, ref.relays ?? [])}`;
  return `<a href="${esc(href)}" class="nostr-person" title="${esc(shortNpub(ref.pubkey))}">@${esc(name)}</a>`;
}

function stripMarkup(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  return div.textContent || '';
}

function decodeNip19(value) {
  const bech = String(value ?? '').toLowerCase();
  const pos = bech.lastIndexOf('1');
  if (pos < 1 || pos + 7 > bech.length) return null;
  const prefix = bech.slice(0, pos);
  const payload = bech.slice(pos + 1, -6);
  const words = [];
  for (const ch of payload) {
    const index = BECH32_CHARS.indexOf(ch);
    if (index < 0) return null;
    words.push(index);
  }
  return { prefix, bytes: convertBits(words, 5, 8, false) };
}

const BECH32_CHARS = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';

function convertBits(data, fromBits, toBits, pad) {
  let acc = 0;
  let bits = 0;
  const ret = [];
  const maxv = (1 << toBits) - 1;
  for (const value of data) {
    if (value < 0 || (value >> fromBits)) return [];
    acc = (acc << fromBits) | value;
    bits += fromBits;
    while (bits >= toBits) {
      bits -= toBits;
      ret.push((acc >> bits) & maxv);
    }
  }
  if (pad && bits) ret.push((acc << (toBits - bits)) & maxv);
  return ret;
}

function bytesToHex(bytes) {
  return [...bytes].map(byte => byte.toString(16).padStart(2, '0')).join('');
}

function hexToBytes(hex) {
  return String(hex ?? '').match(/.{1,2}/g)?.map(part => parseInt(part, 16)) ?? [];
}

function isHex(value, length = null) {
  const text = String(value ?? '');
  return /^[0-9a-f]+$/i.test(text) && (length === null || text.length === length);
}

function encodeNote(eventId) {
  return nip19Encode('note', hexToBytes(eventId));
}

function encodeNprofile(pubkey, relays = []) {
  const bytes = [0, 32, ...hexToBytes(pubkey)];
  for (const relay of relays.filter(Boolean).slice(0, 3)) {
    const encoded = [...new TextEncoder().encode(relay)];
    bytes.push(1, encoded.length, ...encoded);
  }
  return nip19Encode('nprofile', bytes);
}

function nip19Encode(prefix, bytes) {
  const words = convertBits(bytes, 8, 5, true);
  const checksum = bech32CreateChecksum(prefix, words);
  return `${prefix}1${[...words, ...checksum].map(i => BECH32_CHARS[i]).join('')}`;
}

function bech32CreateChecksum(prefix, words) {
  const values = [...bech32HrpExpand(prefix), ...words, 0, 0, 0, 0, 0, 0];
  const polymod = bech32Polymod(values) ^ 1;
  const checksum = [];
  for (let p = 0; p < 6; p++) checksum.push((polymod >> (5 * (5 - p))) & 31);
  return checksum;
}

function bech32HrpExpand(prefix) {
  const out = [];
  for (let i = 0; i < prefix.length; i++) out.push(prefix.charCodeAt(i) >> 5);
  out.push(0);
  for (let i = 0; i < prefix.length; i++) out.push(prefix.charCodeAt(i) & 31);
  return out;
}

function bech32Polymod(values) {
  const generator = [0x3b6a57b2, 0x26508e6d, 0x1ea119fa, 0x3d4233dd, 0x2a1462b3];
  let chk = 1;
  for (const value of values) {
    const top = chk >> 25;
    chk = ((chk & 0x1ffffff) << 5) ^ value;
    for (let i = 0; i < 5; i++) if ((top >> i) & 1) chk ^= generator[i];
  }
  return chk;
}

function esc(str) {
  if (str === undefined || str === null) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function setStatus(ok, text) {
  const el = document.getElementById('status-bar');
  el.className = `sidebar-status${ok ? '' : ' error'}`;
  el.innerHTML = `<span class="dot"></span>${esc(text)}`;
}
